name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        python-version: ["3.9", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e .

      - name: Verify imports
        run: |
          python -c "import lav; print(f'lav {lav.__version__}')"
          python -c "from lav import config, queries, pricing"
          python -c "from lav.parsers import jsonl, chatgpt"

      - name: Verify CLI entry points
        run: |
          lav --help
          lav-parse --help
          lav-pricing --help

      - name: Parse into empty DB (smoke test)
        run: |
          lav-parse
          lav search "test" --format brief || true

      - name: Server health check
        run: |
          lav-server > /tmp/lav-server.log 2>&1 &
          sleep 3
          cat /tmp/lav-server.log
          curl -f --retry 3 --retry-delay 2 http://127.0.0.1:8764/api/health
          kill %1
