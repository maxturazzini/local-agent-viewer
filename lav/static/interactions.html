<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactions | LocalAgentViewer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* AI, MAX Brand Guidelines */
        :root {
            --white: #FFFFFF;
            --black: #000000;
            --dodger-blue: #004BFF;
            --deep-sky-blue: #35C2FF;
            --yellow: #F9C927;
            --spring-green: #00D35D;
            --red: #FF4C53;
            --orange: #FF7A20;
            --light-pink: #FF9DCB;
            --lilla: #6E87FF;
            --dim-gray: #666666;
            --dark-gray: #999999;
            --light-gray: #F2F2F2;
            --ai-gradient: linear-gradient(135deg, #004BFF 0%, #35C2FF 100%);

            /* ===== Quiet Canvas tokens (LAV-63 transcript component) ===== */
            --surface: #F7F8FA;
            --surface-2: #F1F3F5;
            --border: #E6E8EB;
            --text: #1A1D21;
            --muted: #6B7280;
            --accent: #004BFF;
            --error: #DC2626;
            --error-bg: #FCEFEF;
            --mono: ui-monospace,"SF Mono",SFMono-Regular,Menlo,Consolas,"Liberation Mono",monospace;
            --sans: -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
            --s1: 4px; --s2: 8px; --s3: 12px; --s4: 16px; --s5: 24px; --s6: 32px;
            --radius: 8px;
            --radius-sm: 6px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--light-gray);
            min-height: 100vh;
            color: var(--black);
            padding: 12px;
            font-size: 15px;
            line-height: 1.3;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 12px;
            padding: 12px 16px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-container { height: 28px; }
        .logo-container svg { height: 100%; width: auto; }

        .header-title {
            border-left: 2px solid var(--light-gray);
            padding-left: 8px;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--black);
            margin-bottom: 0;
        }

        .header .subtitle {
            color: var(--dim-gray);
            font-size: 0.75rem;
        }

        .main-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .main-nav-link {
            color: var(--dim-gray);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .main-nav-link:hover {
            background: var(--light-gray);
            color: var(--black);
        }

        .main-nav-link.active {
            background: var(--ai-gradient);
            color: var(--white);
        }
        .nav-sync-btn {
            color: var(--dim-gray); font-weight: 600; font-size: 0.9rem;
            padding: 8px 16px; border-radius: 8px; border: 1px solid var(--light-gray);
            background: var(--white); cursor: pointer; transition: all 0.2s;
        }
        .nav-sync-btn:hover { background: var(--light-gray); color: var(--black); }
        .nav-sync-btn.syncing { opacity: 0.6; pointer-events: none; }

        /* ===== FILTERS ===== */
        .filters-bar {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 12px;
            padding: 10px 16px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            flex-wrap: wrap;
        }

        .filter-group {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .filter-label {
            font-size: 0.75rem;
            color: var(--dim-gray);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .filter-select, .filter-input {
            padding: 4px 8px;
            border: 2px solid var(--light-gray);
            border-radius: 6px;
            background: var(--white);
            color: var(--black);
            font-family: inherit;
            font-size: 0.85rem;
            transition: border-color 0.2s;
        }

        .filter-select:hover:not(:disabled), .filter-select:focus:not(:disabled),
        .filter-input:hover, .filter-input:focus {
            border-color: var(--deep-sky-blue);
            outline: none;
        }

        .filter-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            background: var(--light-gray);
        }

        /* Project searchable combobox */
        .project-filter-wrapper { position: relative; }

        .project-filter-input {
            padding: 4px 8px;
            border: 2px solid var(--light-gray);
            border-radius: 6px;
            background: var(--white);
            color: var(--black);
            font-family: inherit;
            font-size: 0.85rem;
            transition: border-color 0.2s;
            min-width: 150px;
            width: 150px;
        }

        .project-filter-input:hover,
        .project-filter-input:focus {
            border-color: var(--deep-sky-blue);
            outline: none;
        }

        .project-dropdown {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.15);
            max-height: 240px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .project-dropdown.active { display: block; }

        .project-option {
            padding: 6px 10px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: background 0.15s;
        }

        .project-option:hover { background: var(--light-gray); }
        .project-option.selected { background: rgba(0, 75, 255, 0.1); color: var(--dodger-blue); font-weight: 600; }

        .search-input {
            min-width: 200px;
            flex: 1;
        }

        .btn {
            padding: 4px 12px;
            background: var(--ai-gradient);
            color: var(--white);
            border: none;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
            font-family: inherit;
        }

        .btn:hover { opacity: 0.9; }

        .btn-secondary {
            background: var(--light-gray);
            color: var(--dim-gray);
        }

        /* ===== STATS BAR ===== */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            padding: 8px 16px;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .stat-value {
            font-weight: 700;
            color: var(--dodger-blue);
            font-size: 0.9rem;
        }

        .stat-label {
            color: var(--dim-gray);
            font-size: 0.8rem;
        }

        /* ===== INTERACTIONS LIST ===== */
        .interactions-container {
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            overflow: hidden;
        }

        .interaction-header {
            display: grid;
            grid-template-columns: 140px 1fr 100px 100px 90px 100px 90px 90px 80px 70px 90px 100px;
            gap: 8px;
            padding: 10px 16px;
            border-bottom: 2px solid var(--light-gray);
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--dodger-blue);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .interaction-header > [data-col] {
            position: relative;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            user-select: none;
        }
        .col-resizer {
            position: absolute;
            top: 0;
            right: -4px;
            width: 8px;
            height: 100%;
            cursor: col-resize;
            z-index: 2;
        }
        .col-resizer:hover, .col-resizer.dragging {
            background: var(--dodger-blue);
            opacity: 0.4;
        }
        body.col-resizing, body.col-resizing * {
            cursor: col-resize !important;
            user-select: none !important;
        }

        .interaction-item {
            display: grid;
            grid-template-columns: 140px 1fr 100px 100px 90px 100px 90px 90px 80px 70px 90px 100px;
            gap: 12px;
            padding: 10px 16px;
            border-bottom: 1px solid var(--light-gray);
            cursor: pointer;
            transition: background 0.2s;
            align-items: center;
        }

        .interaction-item:hover {
            background: var(--light-gray);
        }

        .conv-timestamp {
            font-size: 0.8rem;
            color: var(--dim-gray);
        }

        .conv-summary-cell {
            display: flex;
            align-items: center;
            gap: 8px;
            overflow: hidden;
        }

        .conv-display {
            font-size: 0.9rem;
            color: var(--black);
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            flex: 1;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.7rem;
            font-weight: 600;
            white-space: nowrap;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .badge:hover { opacity: 0.8; }

        .badge-project {
            color: var(--white);
        }

        .badge-user {
            background: rgba(110, 135, 255, 0.15);
            color: var(--lilla);
        }

        .badge-model {
            background: rgba(0, 75, 255, 0.1);
            color: var(--dodger-blue);
            cursor: default;
        }

        .badge-model:hover { opacity: 1; }

        .conv-tokens {
            font-weight: 600;
            color: var(--dodger-blue);
            font-size: 0.85rem;
        }

        .conv-messages {
            color: var(--dim-gray);
            font-size: 0.8rem;
        }

        .conv-tools {
            font-size: 0.75rem;
            color: var(--dark-gray);
        }

        .conv-session-id {
            font-size: 0.7rem;
            padding: 2px 6px;
            background: rgba(100, 100, 100, 0.1);
            color: var(--dim-gray);
            border-radius: 4px;
            cursor: pointer;
            font-family: 'Monaco', 'Menlo', 'Courier New', monospace;
            transition: all 0.2s;
        }

        .conv-session-id:hover {
            background: rgba(0, 75, 255, 0.2);
            color: var(--dodger-blue);
        }

        /* ===== MODAL ===== */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 4px;
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--white);
            border-radius: 12px;
            max-width: 900px;
            width: 100%;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }

        .kb-enrichment {
            padding: 12px 16px;
            margin: 8px 10px;
            background: linear-gradient(135deg, rgba(0,75,255,0.04), rgba(53,194,255,0.06));
            border: 1.5px solid var(--dodger-blue);
            border-radius: 8px;
            font-size: 0.85rem;
        }
        .kb-enrichment-summary { font-weight: 600; margin-bottom: 4px; color: var(--black); }
        .kb-enrichment-abstract { color: var(--dim-gray); line-height: 1.4; margin-bottom: 8px; }
        .kb-enrichment-process { color: var(--dodger-blue); font-size: 0.8rem; font-style: italic; margin-bottom: 8px; }
        .kb-enrichment-meta { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; font-size: 0.8rem; color: var(--dark-gray); }
        .badge-classification { padding: 1px 6px; border-radius: 3px; font-weight: 600; font-size: 0.65rem; text-transform: uppercase; display: inline-block; line-height: 1.4; }
        .badge-classification.development { background: rgba(0, 75, 255, 0.1); color: var(--dodger-blue); }
        .badge-classification.meeting { background: rgba(249, 201, 39, 0.15); color: #B8860B; }
        .badge-classification.analysis { background: rgba(0, 211, 93, 0.1); color: #00A94A; }
        .badge-classification.brainstorm { background: rgba(255, 122, 32, 0.1); color: var(--orange); }
        .badge-classification.support { background: rgba(255, 76, 83, 0.1); color: var(--red); }
        .badge-classification.learning { background: rgba(110, 135, 255, 0.15); color: var(--lilla); }

        .kb-enrichment-classification { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
        .kb-enrichment-classification.development { background: rgba(0, 75, 255, 0.1); color: var(--dodger-blue); }
        .kb-enrichment-classification.meeting { background: rgba(249, 201, 39, 0.15); color: #B8860B; }
        .kb-enrichment-classification.analysis { background: rgba(0, 211, 93, 0.1); color: var(--spring-green); }
        .kb-enrichment-classification.brainstorm { background: rgba(255, 122, 32, 0.1); color: var(--orange); }
        .kb-enrichment-classification.support { background: rgba(255, 76, 83, 0.1); color: var(--red); }
        .kb-enrichment-classification.learning { background: rgba(110, 135, 255, 0.15); color: var(--lilla); }
        .kb-enrichment-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }
        .kb-tag { padding: 2px 8px; background: var(--light-gray); border-radius: 4px; font-size: 0.75rem; color: var(--dim-gray); }
        .kb-tag.topic { background: rgba(53, 194, 255, 0.15); color: var(--deep-sky-blue); }
        .kb-tag.client { background: rgba(255, 157, 203, 0.2); color: #c06; }
        .kb-tag.person { background: rgba(110, 135, 255, 0.15); color: var(--lilla); }
        .kb-sensitivity { padding: 2px 8px; border-radius: 4px; font-weight: 600; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.5px; }
        .kb-sensitivity.public { background: rgba(0, 211, 93, 0.1); color: var(--spring-green); }
        .kb-sensitivity.internal { background: rgba(53, 194, 255, 0.1); color: var(--deep-sky-blue); }
        .kb-sensitivity.confidential { background: rgba(255, 165, 0, 0.15); color: #cc8400; }
        .kb-sensitivity.restricted { background: rgba(255, 76, 83, 0.15); color: var(--red); }

        /* =====================================================================
           TRANSCRIPT COMPONENT (.tx) — "Quiet Canvas" (LAV-63)
           Container-agnostic: knows nothing about the modal/dock shell.
           ===================================================================== */
        .tx { display: flex; flex-direction: column; min-height: 0; flex: 1 1 auto; height: 100%; }

        /* --- component header --- */
        .tx-head {
            flex: 0 0 auto;
            padding: var(--s4) var(--s5) var(--s3);
            border-bottom: 1px solid var(--border);
            background: var(--white);
        }
        .tx-head-top { display: flex; align-items: flex-start; gap: var(--s3); }
        .tx-title {
            font-size: 15px; font-weight: 600; margin: 0; letter-spacing: -.01em;
            flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .tx-close {
            flex: 0 0 auto; border: none; background: transparent; cursor: pointer;
            width: 28px; height: 28px; border-radius: var(--radius-sm); color: var(--muted);
            font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
            transition: background .15s, color .15s;
        }
        .tx-close:hover { background: var(--surface); color: var(--text); }
        .tx-close:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

        /* meta row — quiet, all neutral */
        .tx-meta {
            display: flex; flex-wrap: wrap; gap: var(--s1) var(--s4);
            margin-top: var(--s2); font-size: 12px; color: var(--muted);
        }
        .tx-meta b { color: var(--text); font-weight: 600; }
        .tx-meta .dot { color: #c4c8cd; }
        .tx-meta .tx-session-id {
            font-family: var(--mono); font-size: 12px; line-height: inherit;
            color: var(--muted); border: none; cursor: pointer;
            background: var(--surface-2); border-radius: var(--radius-sm);
            padding: 1px 7px; transition: background .15s, color .15s;
        }
        .tx-meta .tx-session-id:hover { background: rgba(0,75,255,.1); color: var(--accent); }
        .tx-meta .tx-session-id:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

        /* --- shell slot (KB band + tabs injected here) --- */
        .tx-aux { flex: 0 0 auto; }

        /* tab strip injected into the slot by the shell */
        .tx-tabs {
            display: flex; gap: 0;
            border-bottom: 1px solid var(--border);
            padding: 0 var(--s5);
        }
        .tx-tab {
            padding: 10px 18px; background: none; border: none;
            border-bottom: 2px solid transparent;
            color: var(--muted); font-family: inherit; font-size: 0.85rem; font-weight: 600;
            cursor: pointer; transition: color .15s, border-color .15s;
        }
        .tx-tab:hover { color: var(--text); }
        .tx-tab.active { color: var(--text); border-bottom-color: var(--accent); }
        .tx-tab:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

        /* --- scroll body --- */
        .tx-body {
            flex: 1 1 auto; min-height: 0; overflow-y: auto;
            padding: var(--s5) var(--s5) var(--s6);
            scrollbar-width: thin;
            background: var(--light-gray); /* app-gray page; white cards sit on top */
        }
        .tx-body::-webkit-scrollbar { width: 10px; }
        .tx-body::-webkit-scrollbar-thumb { background: #dfe2e6; border: 3px solid var(--white); border-radius: 8px; }

        /* cost panel reuses scroll behaviour */
        .tx-cost {
            flex: 1 1 auto; min-height: 0; overflow-y: auto;
            padding: var(--s5);
            background: var(--light-gray);
        }

        /* --- breadcrumb (inside body) --- */
        .tx-breadcrumb { font-size: 13px; color: var(--muted); margin-bottom: var(--s4); }
        .tx-breadcrumb a { color: var(--accent); text-decoration: none; }
        .tx-breadcrumb a:hover { text-decoration: underline; }

        /* --- derived sessions (Quiet Canvas neutral list) --- */
        .tx-derived { margin-bottom: var(--s4); border: 1px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
        .tx-derived-head {
            width: 100%; text-align: left; font: inherit; cursor: pointer;
            display: flex; align-items: center; gap: var(--s2);
            padding: 8px var(--s3); background: var(--surface); border: none;
            font-size: 12px; font-weight: 600; color: var(--text);
        }
        .tx-derived-head:hover { background: var(--surface-2); }
        .tx-derived-head:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
        .tx-derived-head .call-caret { margin-left: auto; }
        .tx-derived-list { display: none; padding: var(--s1); }
        .tx-derived.open .tx-derived-list { display: block; }
        .tx-derived-item {
            width: 100%; text-align: left; font: inherit; color: var(--text);
            background: none; border: none;
            display: flex; align-items: center; gap: var(--s2);
            padding: 6px var(--s2); border-radius: var(--radius-sm);
            cursor: pointer; font-size: 13px;
        }
        .tx-derived-item:hover { background: var(--surface); }
        .tx-derived-item:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }
        .tx-derived-item .di-label { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .tx-derived-item .di-agent { color: var(--muted); }
        .tx-derived-item .di-meta { flex: 0 0 auto; color: var(--muted); font-size: 12px; }

        /* =====================================================================
           TURNS
           ===================================================================== */
        .turn { position: relative; padding: 0 0 var(--s5) var(--s5); margin-left: 2px; }
        .turn::before {
            content: ""; position: absolute; left: 0; top: 5px; bottom: 14px;
            width: 1px; background: var(--border);
        }
        .turn--user::before { background: var(--accent); opacity: .5; }

        .turn-label {
            display: flex; align-items: center; gap: var(--s2);
            margin-bottom: var(--s2);
            font-size: 11px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
        }
        .turn--user .turn-label { color: var(--accent); }
        .turn--assistant .turn-label { color: var(--text); }
        .turn-label .role-sub { font-weight: 500; letter-spacing: .02em; text-transform: none; color: var(--muted); }

        .turn-text {
            font-size: 14.5px; color: var(--text); line-height: 1.6;
            white-space: pre-wrap; word-break: break-word;
        }
        .turn-text + .turn-text { margin-top: var(--s2); }
        .turn-text.is-empty { color: var(--muted); font-style: italic; }

        /* =====================================================================
           SUB-STEPS (thinking / tool_use+result)
           ===================================================================== */
        .substeps { margin-top: var(--s3); display: flex; flex-direction: column; gap: var(--s2); }
        .substep { position: relative; padding-left: var(--s4); }
        .substep::before {
            content: ""; position: absolute; left: calc(-1 * var(--s5)); top: 11px;
            width: calc(var(--s5) + var(--s3)); height: 1px; background: var(--border);
        }

        /* encrypted / empty thinking: ONE muted italic line, no control */
        .think-line {
            font-size: 13px; color: var(--muted); font-style: italic;
            display: flex; align-items: center; gap: 7px; padding: 1px 0;
        }
        .think-line svg { width: 13px; height: 13px; opacity: .7; flex: 0 0 auto; }

        /* =====================================================================
           TOOL CARD — binds tool_use to its tool_result on one neutral card
           ===================================================================== */
        .step-card { border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--white); overflow: hidden; }
        .step-card.is-error { border-color: #f0c9c9; }

        .call-row {
            display: flex; align-items: center; gap: var(--s2);
            width: 100%; text-align: left; font: inherit; cursor: default;
            background: transparent; border: none; padding: 8px var(--s3);
        }
        button.call-row { cursor: pointer; }
        button.call-row:hover { background: var(--surface); }
        button.call-row:focus-visible { outline: 2px solid var(--accent); outline-offset: -2px; }

        .call-icon {
            flex: 0 0 auto; width: 22px; height: 22px; border-radius: 5px;
            background: var(--surface-2); color: var(--muted);
            display: flex; align-items: center; justify-content: center;
        }
        .call-icon svg { width: 13px; height: 13px; }
        .call-name { flex: 0 0 auto; font-family: var(--mono); font-size: 12.5px; font-weight: 600; color: var(--text); }
        .call-preview {
            flex: 1 1 auto; min-width: 0;
            font-family: var(--mono); font-size: 12px; color: var(--muted);
            overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .call-size {
            flex: 0 0 auto; font-size: 11px; color: var(--muted);
            background: var(--surface); border: 1px solid var(--border);
            padding: 1px 7px; border-radius: 999px;
        }
        .call-caret { flex: 0 0 auto; color: var(--muted); width: 14px; height: 14px; transition: transform .18s ease; }
        .step-card.open .call-caret,
        .tx-derived.open .call-caret { transform: rotate(90deg); }

        .call-detail { border-top: 1px solid var(--border); background: var(--surface); padding: var(--s3); display: none; }
        .step-card.open .call-detail { display: block; }
        .detail-label {
            font-size: 10.5px; font-weight: 600; letter-spacing: .06em; text-transform: uppercase;
            color: var(--muted); margin: 0 0 6px;
        }
        .detail-label + .detail-label { margin-top: var(--s3); }
        .code {
            margin: 0; font-family: var(--mono); font-size: 12px; line-height: 1.55;
            color: var(--text); white-space: pre-wrap; word-break: break-word;
            background: var(--white); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 10px 12px;
            max-height: 340px; overflow: auto;
        }

        /* result rows that pair under the call (inside same card) */
        .result-row { display: flex; gap: var(--s2); align-items: flex-start; padding: 8px var(--s3); border-top: 1px dashed var(--border); }
        .step-card > .result-row:nth-child(2) { border-top: none; }
        .result-icon {
            flex: 0 0 auto; width: 22px; height: 22px; border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            background: var(--surface-2); color: var(--muted);
        }
        .result-icon svg { width: 13px; height: 13px; }
        .result-body { flex: 1 1 auto; min-width: 0; }
        .result-meta { font-size: 11px; color: var(--muted); margin-bottom: 3px; display: flex; align-items: center; gap: 6px; }
        .result-meta .dot { color: #c4c8cd; }
        .result-text { font-family: var(--mono); font-size: 12px; color: var(--text); white-space: pre-wrap; word-break: break-word; margin: 0; }
        .result-text.clamp {
            max-height: 7.2em; overflow: hidden;
            -webkit-mask-image: linear-gradient(180deg,#000 70%,transparent);
                    mask-image: linear-gradient(180deg,#000 70%,transparent);
        }
        .result-expand {
            margin-top: 6px; font: inherit; font-size: 11.5px; cursor: pointer;
            border: none; background: transparent; color: var(--accent); padding: 0;
        }
        .result-expand:hover { text-decoration: underline; }
        .result-expand:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

        /* ERROR result — the ONLY place red appears */
        .result-row.is-error { background: var(--error-bg); }
        .result-row.is-error .result-icon { background: #f7dada; color: var(--error); }
        .result-row.is-error .result-meta { color: var(--error); font-weight: 600; }
        .result-row.is-error .result-text { color: var(--error); }

        /* orphan result rendered standalone (unpaired tool_result) */
        .substep > .result-row { border-top: none; border: 1px solid var(--border); border-radius: var(--radius-sm); }
        .substep > .result-row.is-error { border-color: #f0c9c9; }

        /* Grouped/Flat segmented toggle */
        .list-mode-toggle {
            display: inline-flex;
            border: 2px solid var(--light-gray);
            border-radius: 8px;
            overflow: hidden;
        }
        .list-mode-btn {
            padding: 8px 14px;
            border: none;
            background: var(--white);
            color: var(--dim-gray);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }
        .list-mode-btn + .list-mode-btn { border-left: 2px solid var(--light-gray); }
        .list-mode-btn:hover { color: var(--dodger-blue); }
        .list-mode-btn.active { background: var(--dodger-blue); color: var(--white); }

        /* Derived-sessions pill on a master row */
        .derived-pill {
            display: inline-block;
            margin-left: 6px;
            padding: 1px 7px;
            border-radius: 10px;
            background: rgba(0, 75, 255, 0.08);
            color: var(--dodger-blue);
            font-size: 0.72rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
        }
        .derived-pill:hover { background: rgba(0, 75, 255, 0.16); }
        .derived-child-row { background: rgba(0, 75, 255, 0.025); }

        /* ===== PAGINATION ===== */
        .pagination {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 16px;
            border-top: 1px solid var(--light-gray);
        }

        .pagination button {
            padding: 8px 16px;
            border: 2px solid var(--light-gray);
            background: var(--white);
            border-radius: 8px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            border-color: var(--deep-sky-blue);
            color: var(--dodger-blue);
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .pagination .page-info {
            color: var(--dim-gray);
            font-size: 0.9rem;
        }

        /* ===== LOADING / EMPTY ===== */
        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px;
            color: var(--dim-gray);
        }

        .loading::after {
            content: '';
            width: 32px;
            height: 32px;
            border: 3px solid var(--light-gray);
            border-top-color: var(--dodger-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 12px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--dim-gray);
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--black);
        }

        /* ===== FOOTER ===== */
        .footer {
            text-align: center;
            padding: 24px;
            color: var(--dim-gray);
            font-size: 0.85rem;
        }

        .footer a {
            color: var(--dodger-blue);
            text-decoration: none;
        }

        /* ===== COLUMN TOGGLE ===== */
        .col-toggle-wrapper {
            position: relative;
            display: inline-block;
        }

        .col-toggle-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: var(--white);
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.15);
            padding: 8px 0;
            z-index: 100;
            min-width: 180px;
            margin-top: 4px;
        }

        .col-toggle-dropdown.open { display: block; }

        .col-toggle-dropdown label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 0.82rem;
            color: var(--black);
            white-space: nowrap;
        }

        .col-toggle-dropdown label:hover { background: var(--light-gray); }

        .col-toggle-dropdown input[type="checkbox"] {
            accent-color: var(--dodger-blue);
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 900px) {
            .interaction-header { display: none; }
            .interaction-item {
                grid-template-columns: 1fr;
                gap: 4px;
            }
            .filters-bar {
                flex-direction: column;
                align-items: stretch;
            }
            .search-input { min-width: auto; }
        }
    </style>
</head>

    <!-- ===== MODAL (popup shell — hosts the .tx transcript component) ===== -->

        <div class="modal" id="modalHost" role="dialog" aria-modal="true" aria-labelledby="txDialogTitle" tabindex="-1"></div>
    </div>

    <script>
    // ===== CONFIGURATION =====
    const API_BASE = (window.location.origin && window.location.origin !== 'null')
        ? window.location.origin
        : 'http://localhost:8764';
    const LIMIT = 25;

    // ===== COLUMN VISIBILITY =====
    const COLUMNS = [
        { key: 'timestamp', label: 'Timestamp', width: '140px' },
        { key: 'summary',   label: 'Summary',   width: '1fr' },
        { key: 'project',   label: 'Project',   width: '100px' },
        { key: 'user',      label: 'User',      width: '100px' },
        { key: 'host',      label: 'Host',       width: '90px' },
        { key: 'source',    label: 'Source',     width: '100px' },
        { key: 'class',     label: 'Class',      width: '90px' },
        { key: 'sens',      label: 'Sensitivity', width: '90px' },
        { key: 'tokens',    label: 'Tokens',     width: '80px' },
        { key: 'cost',      label: 'Cost',       width: '70px' },
        { key: 'messages',  label: 'Messages',   width: '90px' },
        { key: 'session',   label: 'Session',    width: '100px' }
    ];
    const COL_STORAGE_KEY = 'lav-visible-columns';
    const COL_WIDTH_STORAGE_KEY = 'lav-column-widths';
    const MIN_COL_WIDTH = 50;

    function getVisibleColumns() {
        try {
            const saved = localStorage.getItem(COL_STORAGE_KEY);
            if (saved) return JSON.parse(saved);
        } catch(e) {}
        return COLUMNS.map(c => c.key);
    }

    function saveVisibleColumns(keys) {
        localStorage.setItem(COL_STORAGE_KEY, JSON.stringify(keys));
    }

    function loadColumnWidths() {
        try {
            const saved = localStorage.getItem(COL_WIDTH_STORAGE_KEY);
            if (!saved) return;
            const widths = JSON.parse(saved);
            COLUMNS.forEach(c => {
                if (widths[c.key]) c.width = widths[c.key];
            });
        } catch(e) {}
    }

    function saveColumnWidths() {
        const widths = {};
        COLUMNS.forEach(c => { widths[c.key] = c.width; });
        localStorage.setItem(COL_WIDTH_STORAGE_KEY, JSON.stringify(widths));
    }

    loadColumnWidths();
    let visibleColumns = getVisibleColumns();

    function applyColumnVisibility() {
        const gridCols = COLUMNS
            .filter(c => visibleColumns.includes(c.key))
            .map(c => c.width)
            .join(' ');
        document.querySelectorAll('.interaction-header, .interaction-item').forEach(el => {
            el.style.gridTemplateColumns = gridCols;
        });
        document.querySelectorAll('[data-col]').forEach(el => {
            el.style.display = visibleColumns.includes(el.dataset.col) ? '' : 'none';
        });
        installColumnResizers();
    }

    function installColumnResizers() {
        const header = document.getElementById('interactionHeader');
        if (!header) return;
        header.querySelectorAll('[data-col]').forEach(cell => {
            if (cell.querySelector('.col-resizer')) return;
            const handle = document.createElement('div');
            handle.className = 'col-resizer';
            handle.addEventListener('mousedown', (e) => startColumnResize(e, cell));
            cell.appendChild(handle);
        });
    }

    function startColumnResize(e, cell) {
        e.preventDefault();
        e.stopPropagation();
        const key = cell.dataset.col;
        const col = COLUMNS.find(c => c.key === key);
        if (!col) return;
        const startX = e.clientX;
        const startWidth = cell.getBoundingClientRect().width;
        const handle = cell.querySelector('.col-resizer');
        handle.classList.add('dragging');
        document.body.classList.add('col-resizing');

        function onMove(ev) {
            const delta = ev.clientX - startX;
            const newWidth = Math.max(MIN_COL_WIDTH, Math.round(startWidth + delta));
            col.width = newWidth + 'px';
            applyColumnGridOnly();
        }
        function onUp() {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            handle.classList.remove('dragging');
            document.body.classList.remove('col-resizing');
            saveColumnWidths();
        }
        document.addEventListener('mousemove', onMove);
        document.addEventListener('mouseup', onUp);
    }

    function applyColumnGridOnly() {
        const gridCols = COLUMNS
            .filter(c => visibleColumns.includes(c.key))
            .map(c => c.width)
            .join(' ');
        document.querySelectorAll('.interaction-header, .interaction-item').forEach(el => {
            el.style.gridTemplateColumns = gridCols;
        });
    }

    function initColumnToggle() {
        const dropdown = document.getElementById('colToggleDropdown');
        dropdown.innerHTML = COLUMNS.map(col => {
            const checked = visibleColumns.includes(col.key) ? 'checked' : '';
            return `<label><input type="checkbox" value="${col.key}" ${checked}> ${col.label}</label>`;
        }).join('');
        dropdown.querySelectorAll('input').forEach(cb => {
            cb.addEventListener('change', () => {
                if (cb.checked) {
                    if (!visibleColumns.includes(cb.value)) visibleColumns.push(cb.value);
                } else {
                    visibleColumns = visibleColumns.filter(k => k !== cb.value);
                    if (visibleColumns.length === 0) {
                        cb.checked = true;
                        visibleColumns.push(cb.value);
                        return;
                    }
                }
                saveVisibleColumns(visibleColumns);
                applyColumnVisibility();
            });
        });
        document.getElementById('colToggleBtn').addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle('open');
        });
        document.addEventListener('click', (e) => {
            if (!e.target.closest('.col-toggle-wrapper')) {
                dropdown.classList.remove('open');
            }
        });
        applyColumnVisibility();
    }

    // ===== STATE =====
    const state = {
        project: null,
        projectId: null,
        user: null,
        host: null,
        source: null,
        startDate: (() => { const d = new Date(); d.setDate(d.getDate() - 30); return d.toISOString().split('T')[0]; })(),
        endDate: new Date().toISOString().split('T')[0],
        search: '',
        offset: 0,
        total: 0,
        projects: [],
        users: [],
        hosts: [],
        multiUser: false,
        expandedId: null,
        listMode: (localStorage.getItem('lav.listMode') === 'flat') ? 'flat' : 'grouped'
    };

    // Project color map for badges
    const PROJECT_COLORS = [
        '#004BFF', '#00D35D', '#FF7A20', '#6E87FF', '#F9C927',
        '#FF4C53', '#35C2FF', '#FF9DCB', '#666666', '#999999'
    ];
    const projectColorMap = {};
    function getProjectColor(name) {
        if (!projectColorMap[name]) {
            const idx = Object.keys(projectColorMap).length;
            projectColorMap[name] = PROJECT_COLORS[idx % PROJECT_COLORS.length];
        }
        return projectColorMap[name];
    }

    // ===== UTILITY =====
    function formatNumber(n) {
        if (n == null) return '0';
        if (n >= 1_000_000) return (n / 1_000_000).toFixed(1) + 'M';
        if (n >= 1_000) return (n / 1_000).toFixed(1) + 'K';
        return n.toLocaleString();
    }

    function formatTimestamp(ts) {
        if (!ts) return '-';
        const date = new Date(ts);
        return date.toLocaleString('it-IT', {
            day: '2-digit', month: 'short', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        });
    }

    function shortenModel(model) {
        if (!model) return '-';
        return model.replace('claude-', '').replace(/-\d{8}$/, '');
    }

    function shortenSessionId(sid) {
        if (!sid) return '';
        // For chatgpt:UUID, show first 8 chars of the UUID part
        if (sid.startsWith('chatgpt:')) return sid.substring(8, 16);
        return sid.substring(0, 8);
    }

    function buildQueryParams() {
        const params = new URLSearchParams();
        if (state.project) params.set('project', state.project);
        if (state.user) params.set('user', state.user);
        if (state.host) params.set('host', state.host);
        if (state.source) params.set('client', state.source);
        if (state.startDate) params.set('start', state.startDate);
        if (state.endDate) params.set('end', state.endDate);
        if (state.search) params.set('search', state.search);
        params.set('grouped', state.listMode === 'flat' ? 'false' : 'true');
        params.set('offset', state.offset);
        params.set('limit', LIMIT);
        return params.toString();
    }

    async function apiFetch(endpoint) {
        const sep = endpoint.includes('?') ? '&' : '?';
        const qs = buildQueryParams();
        const url = `${API_BASE}${endpoint}${qs ? sep + qs : ''}`;
        const res = await fetch(url);
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        return res.json();
    }

    async function apiFetchRaw(url) {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`API error: ${res.status}`);
        return res.json();
    }

    // ===== FILTER INITIALIZATION =====
    async function initFilters() {
        try {
            const [projects, users, hosts] = await Promise.all([
                apiFetchRaw(`${API_BASE}/api/projects`).catch(() => []),
                apiFetchRaw(`${API_BASE}/api/users`).catch(() => []),
                apiFetchRaw(`${API_BASE}/api/hosts`).catch(() => [])
            ]);

            state.projects = projects;
            state.users = users;
            state.hosts = hosts;
            state.multiUser = users.length > 1;

            // Assign colors to all projects
            projects.forEach(p => getProjectColor(p.name));

            // Project searchable combobox
            populateProjectDropdown(projects);

            // User filter
            const userSelect = document.getElementById('userFilter');
            userSelect.textContent = '';
            const allUsersOpt = document.createElement('option');
            allUsersOpt.value = '';
            allUsersOpt.textContent = 'All Users';
            userSelect.appendChild(allUsersOpt);
            users.forEach(u => {
                const opt = document.createElement('option');
                opt.value = u.username;
                opt.textContent = u.display_name || u.username;
                userSelect.appendChild(opt);
            });
            autoDisableFilter(userSelect, users.length);

            // Host filter
            const hostSelect = document.getElementById('hostFilter');
            hostSelect.textContent = '';
            const allHostsOpt = document.createElement('option');
            allHostsOpt.value = '';
            allHostsOpt.textContent = 'All Hosts';
            hostSelect.appendChild(allHostsOpt);
            hosts.forEach(h => {
                const opt = document.createElement('option');
                opt.value = h.hostname;
                opt.textContent = h.hostname;
                hostSelect.appendChild(opt);
            });
            autoDisableFilter(hostSelect, hosts.length);

            // Source filter - populate dynamically from DB
            const SOURCE_LABELS = {
                claude_code: 'Claude Code',
                codex_cli: 'Codex CLI',
                cowork_desktop: 'Claude Desktop',
                chatgpt: 'ChatGPT',
                claude_ai: 'Claude.ai',
            };
            const distinctSources = new Set();
            projects.forEach(p => {
                if (p.sources) p.sources.forEach(s => distinctSources.add(s));
            });
            const sourceSelect = document.getElementById('sourceFilter');
            while (sourceSelect.options.length > 1) sourceSelect.remove(1);
            [...distinctSources].sort().forEach(s => {
                const opt = document.createElement('option');
                opt.value = s;
                opt.textContent = SOURCE_LABELS[s] || s;
                sourceSelect.appendChild(opt);
            });
            autoDisableFilter(sourceSelect, distinctSources.size);

            // Check URL params for pre-filters
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('project')) {
                const projName = urlParams.get('project');
                const proj = projects.find(p => p.name === projName);
                if (proj) {
                    state.project = proj.name;
                    state.projectId = proj.id;
                    document.getElementById('projectFilter').value = proj.name;
                }
            }
            if (urlParams.get('user')) {
                state.user = urlParams.get('user');
                document.getElementById('userFilter').value = state.user;
            }

        } catch (err) {
            console.error('Failed to init filters:', err);
        }
    }

    function autoDisableFilter(selectEl, count) {
        const optionCount = selectEl.options.length - 1;
        if (optionCount <= 1) {
            selectEl.disabled = true;
            if (optionCount === 1) selectEl.selectedIndex = 1;
        } else {
            selectEl.disabled = false;
        }
    }

    function populateProjectDropdown(projects) {
        const dropdown = document.getElementById('projectDropdown');
        const input = document.getElementById('projectFilter');

        function render(filter) {
            dropdown.textContent = '';
            const allOpt = document.createElement('div');
            allOpt.className = 'project-option' + (!state.project ? ' selected' : '');
            allOpt.textContent = 'All Projects';
            allOpt.addEventListener('click', () => {
                state.project = null;
                state.projectId = null;
                input.value = '';
                input.placeholder = 'All Projects';
                dropdown.classList.remove('active');
                resetAndLoad();
            });
            dropdown.appendChild(allOpt);

            const filtered = filter
                ? projects.filter(p => p.name.toLowerCase().includes(filter.toLowerCase()))
                : projects;

            filtered.forEach(p => {
                const opt = document.createElement('div');
                opt.className = 'project-option' + (state.project === p.name ? ' selected' : '');
                opt.textContent = p.name;
                opt.addEventListener('click', () => {
                    state.project = p.name;
                    state.projectId = p.id;
                    input.value = p.name;
                    dropdown.classList.remove('active');
                    resetAndLoad();
                });
                dropdown.appendChild(opt);
            });
        }

        input.addEventListener('focus', () => {
            render(input.value);
            dropdown.classList.add('active');
        });

        input.addEventListener('input', () => {
            render(input.value);
            dropdown.classList.add('active');
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.project-filter-wrapper')) {
                dropdown.classList.remove('active');
            }
        });
    }

    // ===== FILTER EVENTS =====
    document.getElementById('userFilter').addEventListener('change', function() {
        state.user = this.value || null;
        resetAndLoad();
    });

    document.getElementById('hostFilter').addEventListener('change', function() {
        state.host = this.value || null;
        resetAndLoad();
    });

    document.getElementById('sourceFilter').addEventListener('change', function() {
        state.source = this.value || null;
        resetAndLoad();
    });

    document.getElementById('searchBtn').addEventListener('click', () => {
        state.search = document.getElementById('searchInput').value;
        state.startDate = document.getElementById('startDate').value || null;
        state.endDate = document.getElementById('endDate').value || null;
        resetAndLoad();
    });

    document.getElementById('searchInput').addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            document.getElementById('searchBtn').click();
        }
    });

    document.getElementById('clearBtn').addEventListener('click', () => {
        state.search = '';
        const now = new Date();
        const start = new Date(now);
        start.setDate(start.getDate() - 30);
        state.startDate = start.toISOString().split('T')[0];
        state.endDate = now.toISOString().split('T')[0];
        document.getElementById('searchInput').value = '';
        document.getElementById('startDate').value = state.startDate;
        document.getElementById('endDate').value = state.endDate;
        resetAndLoad();
    });

    function resetAndLoad() {
        state.offset = 0;
        state.expandedId = null;
        loadInteractions();
    }

    // ===== GROUPED / FLAT LIST MODE TOGGLE =====
    function syncListModeUI() {
        document.querySelectorAll('#listModeToggle .list-mode-btn').forEach(function(btn) {
            btn.classList.toggle('active', btn.dataset.mode === state.listMode);
        });
    }

    function setListMode(mode) {
        const next = (mode === 'flat') ? 'flat' : 'grouped';
        if (next === state.listMode) return;
        state.listMode = next;
        localStorage.setItem('lav.listMode', next);
        syncListModeUI();
        resetAndLoad();
    }

    document.querySelectorAll('#listModeToggle .list-mode-btn').forEach(function(btn) {
        btn.addEventListener('click', function() { setListMode(btn.dataset.mode); });
    });
    syncListModeUI();

    // ===== PAGINATION =====
    document.getElementById('prevBtn').addEventListener('click', () => {
        if (state.offset > 0) {
            state.offset -= LIMIT;
            state.expandedId = null;
            loadInteractions();
        }
    });

    document.getElementById('nextBtn').addEventListener('click', () => {
        if (state.offset + LIMIT < state.total) {
            state.offset += LIMIT;
            state.expandedId = null;
            loadInteractions();
        }
    });

    // ===== LOAD INTERACTIONS =====
    async function loadInteractions() {
        const listEl = document.getElementById('interactionsList');
        listEl.textContent = '';
        listEl.insertAdjacentHTML('beforeend', '<div class="loading">Loading interactions</div>');

        try {
            const data = await apiFetch('/api/interactions');
            const interactions = data.interactions || data;
            state.total = data.total || interactions.length;

            // Update stats
            document.getElementById('totalInteractions').textContent = formatNumber(state.total);
            const totalTokens = interactions.reduce((sum, c) => sum + (c.total_tokens || 0), 0);
            document.getElementById('totalTokens').textContent = formatNumber(totalTokens);

            // Update subtitle
            document.getElementById('subtitle').textContent = `${formatNumber(state.total)} interactions`;

            // Render
            listEl.textContent = '';

            if (interactions.length === 0) {
                listEl.insertAdjacentHTML('beforeend',
                    '<div class="empty-state"><h3>No interactions found</h3><p>Try adjusting your filters or running a sync.</p></div>'
                );
                document.getElementById('pagination').style.display = 'none';
                return;
            }

            interactions.forEach(conv => {
                // Main row
                const row = document.createElement('div');
                row.className = 'interaction-item';
                row.dataset.sessionId = conv.session_id;

                const sourceLabel = (conv.client_source || '').replace('_', ' ');
                const hostShort = (conv.hostname || '').replace('.localdomain', '');

                const metaCls = conv.meta_classification || '';
                const clsBadge = metaCls
                    ? `<span class="badge-classification ${metaCls}">${metaCls}</span>`
                    : '<span style="color:#ccc">-</span>';
                const metaSens = conv.meta_sensitivity || '';
                const sensBadge = metaSens
                    ? `<span class="kb-sensitivity ${metaSens}">${metaSens}</span>`
                    : '<span style="color:#ccc">-</span>';

                const projectName = conv.project || '';
                const derivedCount = (state.listMode !== 'flat') ? (conv.derived_count || 0) : 0;
                const derivedPill = derivedCount > 0
                    ? `<span class="derived-pill" title="Show ${derivedCount} derived session(s)">↳ ${derivedCount} agent${derivedCount === 1 ? '' : 's'}</span>`
                    : '';
                row.insertAdjacentHTML('beforeend', `
                    <div class="conv-timestamp" data-col="timestamp">${formatTimestamp(conv.timestamp)}</div>
                    <div class="conv-summary-cell" data-col="summary">
                        <span class="conv-display" title="${escapeAttr(conv.summary || conv.meta_summary || conv.display || '')}">${escapeHtml(conv.summary || conv.meta_summary || conv.display || '(no summary)')}</span>${derivedPill}
                    </div>
                    <div class="conv-project" data-col="project"><span class="badge badge-project" style="background: ${projectName ? getProjectColor(projectName) : '#999'};" data-project="${escapeAttr(projectName)}" title="Filter by ${escapeAttr(projectName)}">${escapeHtml(projectName || '-')}</span></div>
                    <div class="conv-user" data-col="user">${escapeHtml(conv.username || '-')}</div>
                    <div class="conv-host" data-col="host">${escapeHtml(hostShort || '-')}</div>
                    <div class="conv-source" data-col="source">${escapeHtml(sourceLabel || '-')}</div>
                    <div class="conv-classification" data-col="class">${clsBadge}</div>
                    <div class="conv-sensitivity" data-col="sens">${sensBadge}</div>
                    <div class="conv-tokens" data-col="tokens">${formatNumber(conv.total_tokens)}</div>
                    <div class="conv-cost" data-col="cost" style="font-size:0.82rem;color:var(--spring-green);font-weight:600;">$${(conv.cost_usd || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
                    <div class="conv-messages" data-col="messages">${conv.message_count || 0} msgs</div>
                    <div data-col="session"><span class="conv-session-id" data-full-id="${escapeAttr(conv.session_id || '')}" onclick="event.stopPropagation(); copySessionId(this);">${escapeHtml((conv.session_id || '').substring(0, 8))}</span></div>
                `);

                row.addEventListener('click', (e) => {
                    // Don't toggle if clicking badge to filter
                    if (e.target.closest('.badge-project')) {
                        const projName = e.target.dataset.project;
                        filterByProject(projName);
                        return;
                    }
                    if (e.target.closest('.badge-user')) {
                        const userName = e.target.dataset.user;
                        filterByUser(userName);
                        return;
                    }
                    // Clicking the derived pill expands children inline instead of opening
                    if (e.target.closest('.derived-pill')) {
                        e.stopPropagation();
                        toggleDerivedRows(row, conv);
                        return;
                    }
                    openInteraction(conv.session_id, conv.project_id || conv.project);
                });

                listEl.appendChild(row);
            });

            applyColumnVisibility();

            // Pagination
            const paginationEl = document.getElementById('pagination');
            if (state.total > LIMIT) {
                paginationEl.style.display = 'flex';
                const page = Math.floor(state.offset / LIMIT) + 1;
                const totalPages = Math.ceil(state.total / LIMIT);
                document.getElementById('pageInfo').textContent = `Page ${page} of ${totalPages}`;
                document.getElementById('prevBtn').disabled = state.offset === 0;
                document.getElementById('nextBtn').disabled = state.offset + LIMIT >= state.total;
            } else {
                paginationEl.style.display = 'none';
            }

        } catch (err) {
            console.error('Failed to load interactions:', err);
            listEl.textContent = '';
            listEl.insertAdjacentHTML('beforeend',
                '<div class="empty-state"><h3>Could not connect to server</h3><p>Make sure the backend is running on port 8764</p></div>'
            );
        }
    }

    // ===== INLINE DERIVED-SESSION EXPANSION (grouped list) =====
    function renderDerivedChildRow(child, projectId) {
        const row = document.createElement('div');
        row.className = 'interaction-item derived-child-row';
        const sid = child.session_id || '';
        const label = child.summary || child.display || child.agent_id || '(derived session)';
        row.insertAdjacentHTML('beforeend', `
            <div class="conv-timestamp" data-col="timestamp">${formatTimestamp(child.timestamp)}</div>
            <div class="conv-summary-cell" data-col="summary" style="padding-left:18px;">
                <span style="color:var(--dim-gray);">↳</span>
                <span class="conv-display" title="${escapeAttr(label)}">${escapeHtml(label)}</span>
                ${child.agent_id ? `<span class="derived-pill" style="cursor:default;">${escapeHtml(child.agent_id)}</span>` : ''}
            </div>
            <div class="conv-project" data-col="project"></div>
            <div class="conv-user" data-col="user"></div>
            <div class="conv-host" data-col="host"></div>
            <div class="conv-source" data-col="source"></div>
            <div class="conv-classification" data-col="class"></div>
            <div class="conv-sensitivity" data-col="sens"></div>
            <div class="conv-tokens" data-col="tokens">${formatNumber(child.total_tokens)}</div>
            <div class="conv-cost" data-col="cost" style="font-size:0.82rem;color:var(--spring-green);font-weight:600;">$${(child.cost_usd || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</div>
            <div class="conv-messages" data-col="messages">${child.message_count || 0} msgs</div>
            <div data-col="session"><span class="conv-session-id" data-full-id="${escapeAttr(sid)}" onclick="event.stopPropagation(); copySessionId(this);">${escapeHtml(sid.substring(0, 8))}</span></div>
        `);
        row.addEventListener('click', (e) => {
            if (e.target.closest('.conv-session-id')) return;
            openInteraction(child.session_id, child.project_id || projectId);
        });
        return row;
    }

    async function toggleDerivedRows(masterRow, conv) {
        // Collapse if already expanded
        let next = masterRow.nextElementSibling;
        if (next && next.classList.contains('derived-child-row') && next.dataset.parentSession === conv.session_id) {
            while (next && next.classList.contains('derived-child-row') && next.dataset.parentSession === conv.session_id) {
                const toRemove = next;
                next = next.nextElementSibling;
                toRemove.remove();
            }
            const pill = masterRow.querySelector('.derived-pill');
            if (pill) pill.classList.remove('open');
            return;
        }
        const pill = masterRow.querySelector('.derived-pill');
        if (pill) pill.classList.add('open');
        try {
            const projectId = conv.project_id || conv.project;
            const qs = projectId ? '?project=' + encodeURIComponent(projectId) : '';
            const data = await apiFetchRaw(API_BASE + '/api/interaction/' + encodeURIComponent(conv.session_id) + qs);
            const interaction = (data && (data.interaction || data)) || {};
            const children = interaction.children || [];
            let anchor = masterRow;
            children.forEach(function(child) {
                const childRow = renderDerivedChildRow(child, projectId);
                childRow.dataset.parentSession = conv.session_id;
                anchor.after(childRow);
                anchor = childRow;
            });
            applyColumnVisibility();
        } catch (err) {
            console.error('Failed to load derived sessions:', err);
            if (pill) pill.classList.remove('open');
        }
    }

    // ===== FILTER BY BADGE CLICK =====
    function filterByProject(name) {
        const proj = state.projects.find(p => p.name === name);
        if (proj) {
            state.project = proj.name;
            state.projectId = proj.id;
            document.getElementById('projectFilter').value = proj.name;
            resetAndLoad();
        }
    }

    function filterByUser(username) {
        state.user = username;
        const userSelect = document.getElementById('userFilter');
        for (let i = 0; i < userSelect.options.length; i++) {
            if (userSelect.options[i].value === username) {
                userSelect.selectedIndex = i;
                break;
            }
        }
        resetAndLoad();
    }

    // ===== MODAL: UTILITIES =====
    function escapeHtml(str) {
        if (!str) return '';
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    function escapeAttr(str) {
        // escapeHtml handles &<>; we additionally escape " (and ') for attribute contexts
        return escapeHtml(str).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    function parseMessageContent(content) {
        if (!content) return [{type: 'text', text: ''}];
        if (typeof content === 'string') {
            try {
                const parsed = JSON.parse(content);
                return Array.isArray(parsed) ? parsed : [{type: 'text', text: content}];
            } catch {
                return [{type: 'text', text: content}];
            }
        }
        return Array.isArray(content) ? content : [{type: 'text', text: String(content)}];
    }

    /* ========================================================================
