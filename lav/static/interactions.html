    function toolIcon(name){
        if (TX_ICONS[name]) return TX_ICONS[name];
        return TX_ICONS._default; // covers mcp__* and any unknown tool -> wrench
    }
    function lineCount(s){ return String(s).split('\n').length; }

    /* short preview line for a tool call from its input */
    function callPreview(item){
        const i = item.input || {};
        if (i.command) return i.command;
        if (i.file_path) return i.file_path + (i.offset != null ? '  \u00B7  L' + i.offset + (i.limit ? ('\u2013' + (i.offset + i.limit)) : '') : '');
        if (i.pattern) return i.pattern;
        if (i.description) return i.description;
        return Object.keys(i).join(', ');
    }
    /* whether a call's detail is "long" enough to warrant collapse */
    function callIsLong(item){
        const i = item.input || {};
        const blob = JSON.stringify(i, null, 2);
        return lineCount(blob) > 4 || blob.length > 160 || ('old_string' in i) || ('new_string' in i);
    }
    /* pretty input block for the expanded detail */
    function inputDetail(item){
        const i = item.input || {};
        if ('old_string' in i && 'new_string' in i) {
            return '<p class="detail-label">Replace</p><pre class="code">' + escapeHtml(i.old_string) + '</pre>' +
                   '<p class="detail-label">With</p><pre class="code">' + escapeHtml(i.new_string) + '</pre>' +
                   (i.file_path ? '<p class="detail-label">File</p><pre class="code">' + escapeHtml(i.file_path) + '</pre>' : '');
        }
        return '<p class="detail-label">Input</p><pre class="code">' + escapeHtml(JSON.stringify(i, null, 2)) + '</pre>';
    }

    /* global map tool_use_id -> tool_result (first occurrence wins on dup ids) */
    function indexResults(messages){
        const map = {};
        messages.forEach(function(m){
            parseMessageContent(m.content).forEach(function(c){
                if (c && c.type === 'tool_result' && c.tool_use_id && !(c.tool_use_id in map)) map[c.tool_use_id] = c;
            });
        });
        return map;
    }

    /* one tool_result row \u2014 used both inside a card and standalone (orphan) */
    function resultRowHtml(res){
        const isErr = !!res.is_error;
        const raw = res.content;
        const txt = typeof raw === 'string' ? raw : JSON.stringify(raw);
        const longR = lineCount(txt) > 6;
        return '<div class="result-row' + (isErr ? ' is-error' : '') + '">' +
            '<span class="result-icon">' + (isErr ? TX_ICONS.err : TX_ICONS.ok) + '</span>' +
            '<div class="result-body">' +
                '<div class="result-meta">' + (isErr ? 'Error' : 'Result') +
                    (res.tool_use_id ? ' <span class="dot">\u00B7</span> ' + escapeHtml(res.tool_use_id) : '') + '</div>' +
                '<pre class="result-text' + (longR ? ' clamp' : '') + '">' + escapeHtml(txt) + '</pre>' +
                (longR ? '<button type="button" class="result-expand">Show full result (+' + lineCount(txt) + ' lines)</button>' : '') +
            '</div>' +
        '</div>';
    }

    /* a single tool_use card WITH its paired result bound inside */
    function renderToolCard(item, results, consumed){
        const res = results[item.id];
        if (res && item.id) consumed.add(item.id);
        const _inp = item.input || {};
        const _recognized = _inp.command || _inp.file_path || _inp.pattern || _inp.description;
        // expandable when long, OR when the preview only shows key names (keeps input VALUES reachable)
        const long = callIsLong(item) || (Object.keys(_inp).length > 0 && !_recognized);
        const preview = callPreview(item);
        const sizeHint = long ? ('+' + lineCount(JSON.stringify(item.input || {}, null, 2)) + ' lines') : '';
        const headTag = long ? 'button' : 'div';
        const head =
            '<' + headTag + ' class="call-row"' + (long ? ' type="button" aria-expanded="false"' : '') + '>' +
                '<span class="call-icon">' + toolIcon(item.name) + '</span>' +
                '<span class="call-name">' + escapeHtml(item.name) + '</span>' +
                '<span class="call-preview">' + escapeHtml(preview) + '</span>' +
                (long ? '<span class="call-size">' + sizeHint + '</span>' + TX_ICONS.caret : '') +
            '</' + headTag + '>';
        const detail = long ? '<div class="call-detail">' + inputDetail(item) + '</div>' : '';
        const resultHtml = res ? resultRowHtml(res) : '';
        return '<div class="step-card' + (res && res.is_error ? ' is-error' : '') + '">' + head + detail + resultHtml + '</div>';
    }

    /* content items of a message rendered as substeps (thinking / tool_use) */
    function renderSubsteps(items, results, consumed){
        let html = '';
        items.forEach(function(it){
            if (it.type === 'thinking' || it.type === 'redacted_thinking') {
                const body = (it.thinking || '').trim();
                if (!body) {
                    // encrypted / empty thinking -> ONE muted italic line, no control
                    html += '<div class="substep"><div class="think-line">' + TX_ICONS.brain +
                            'Extended thinking \u2014 encrypted, no readable content</div></div>';
                } else {
                    const lc = lineCount(body);
                    if (lc > 4) {
                        // long thinking: collapsible, preview = first line + size hint
                        html += '<div class="substep"><div class="step-card">' +
                            '<button class="call-row" type="button" aria-expanded="false">' +
                                '<span class="call-icon">' + TX_ICONS.brain + '</span>' +
                                '<span class="call-name">Thinking</span>' +
                                '<span class="call-preview">' + escapeHtml(body.split('\n')[0]) + '</span>' +
                                '<span class="call-size">+' + lc + ' lines</span>' + TX_ICONS.caret +
                            '</button><div class="call-detail"><pre class="code">' + escapeHtml(body) + '</pre></div>' +
                            '</div></div>';
                    } else if (lc > 1) {
                        // 2-4 readable lines: shown wrapped + open, no control (never clipped)
                        html += '<div class="substep"><div class="step-card open">' +
                            '<div class="call-row"><span class="call-icon">' + TX_ICONS.brain + '</span>' +
                            '<span class="call-name">Thinking</span></div>' +
                            '<div class="call-detail"><pre class="code">' + escapeHtml(body) + '</pre></div>' +
                            '</div></div>';
                    } else {
                        // single readable line: inline, no control
                        html += '<div class="substep"><div class="step-card open">' +
                            '<div class="call-row"><span class="call-icon">' + TX_ICONS.brain + '</span>' +
                            '<span class="call-name">Thinking</span>' +
                            '<span class="call-preview">' + escapeHtml(body) + '</span></div>' +
                            '</div></div>';
                    }
                }
            } else if (it.type === 'tool_use') {
                html += '<div class="substep">' + renderToolCard(it, results, consumed) + '</div>';
            }
            // tool_result items are bound via the pairing map, not rendered here
        });
        return html;
    }

    /* a full turn \u2014 keyed on msg.type (real API field), NOT msg.role */
    function renderTurn(msg, results, consumed){
        const items = parseMessageContent(msg.content);
        const isUser = msg.type === 'user';

        // user turn that is ONLY tool_results = continuation -> skip the empty shell.
        // Do NOT mark these consumed here: paired results are already consumed by
        // renderToolCard; leaving unpaired ones unconsumed lets the orphan pass render
        // them so a truly unpaired tool_result never vanishes.
        const onlyResults = isUser && items.length > 0 && items.every(function(i){ return i.type === 'tool_result'; });
        if (onlyResults) {
            return '';
        }

        const texts = items.filter(function(i){ return i.type === 'text' && i.text; });
        const subItems = items.filter(function(i){ return i.type !== 'text' && i.type !== 'tool_result'; });
        const cls = isUser ? 'user' : 'assistant';
        const roleName = isUser ? 'You' : 'Agent';
        const tk = (msg.tokens_in || msg.tokens_out)
            ? ' <span class="role-sub">\u00B7 ' + formatNumber(msg.tokens_in || 0) + ' in / ' + formatNumber(msg.tokens_out || 0) + ' out</span>'
            : '';
        const label = '<div class="turn-label">' + roleName + tk + '</div>';

        let textHtml = texts.map(function(t){ return '<div class="turn-text">' + escapeHtml(t.text) + '</div>'; }).join('');
        const subInner = renderSubsteps(subItems, results, consumed);
        const subHtml = subInner ? '<div class="substeps">' + subInner + '</div>' : '';

        if (!textHtml && !subHtml) {
            // empty-message fallback: raw escaped content, or muted "(empty message)"
            const raw = typeof msg.content === 'string' ? msg.content : JSON.stringify(msg.content);
            if (raw && raw !== '[]' && raw !== '""') {
                textHtml = '<div class="turn-text">' + escapeHtml(raw) + '</div>';
            } else {
                textHtml = '<div class="turn-text is-empty">(empty message)</div>';
            }
        }

        return '<div class="turn turn--' + cls + '">' + label + textHtml + subHtml + '</div>';
    }

    /* breadcrumb to parent (navigation via opts.onOpenInteraction) */
    function renderBreadcrumb(interaction){
        if (!(interaction.parent_session_id && interaction.parent_interaction)) return '';
        const ps = interaction.parent_interaction.summary || interaction.parent_interaction.display || 'Parent';
        const ppid = (interaction.project_id != null) ? interaction.project_id : '';
        return '<nav class="tx-breadcrumb"><a href="#" data-nav-session="' + escapeAttr(interaction.parent_session_id) + '" data-nav-project="' + escapeAttr(String(ppid)) + '">\u2190 ' + escapeHtml(ps.slice(0, 60)) + '</a><span> / Current</span></nav>';
    }

    /* derived (master -> slave) sessions, Quiet Canvas neutral list */
    function renderDerived(interaction){
        const children = (interaction && interaction.children) || [];
        if (!children.length) return '';
        let items = '';
        children.forEach(function(child){
            const sid = child.session_id || '';
            const projId = (child.project_id != null) ? child.project_id : (interaction.project_id != null ? interaction.project_id : '');
            const label = child.summary || child.display || child.agent_id || '(derived session)';
            const agentTag = child.agent_id ? '<span class="di-agent">\u00B7 ' + escapeHtml(child.agent_id) + '</span>' : '';
            const tokens = formatNumber(child.total_tokens) + ' tokens';
            const cost = '$' + (child.cost_usd || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
            items += '<button type="button" class="tx-derived-item" data-nav-session="' + escapeAttr(sid) + '" data-nav-project="' + escapeAttr(String(projId)) + '">' +
                '<span class="di-label">\u21B3 ' + escapeHtml(label) + ' ' + agentTag + '</span>' +
                '<span class="di-meta">' + tokens + ' \u00B7 ' + cost + '</span>' +
                '</button>';
        });
        return '<div class="tx-derived"><button type="button" class="tx-derived-head" aria-expanded="false">Derived sessions (' + children.length + ')' + TX_ICONS.caret + '</button>' +
            '<div class="tx-derived-list">' + items + '</div></div>';
    }

    /* assemble the turn-stream body (breadcrumb + derived + turns + orphans) */
    function buildTranscriptBody(messages, results, consumed, interaction){
        let html = renderBreadcrumb(interaction) + renderDerived(interaction);
        messages.forEach(function(msg){ html += renderTurn(msg, results, consumed); });
        // any UNCONSUMED tool_result (orphan / unpaired) must still render
        let orphans = '';
        messages.forEach(function(msg){
            parseMessageContent(msg.content).forEach(function(c){
                if (c && c.type === 'tool_result') {
                    if (c.tool_use_id) { if (consumed.has(c.tool_use_id)) return; consumed.add(c.tool_use_id); }
                    orphans += '<div class="substep">' + resultRowHtml(c) + '</div>';
                }
            });
        });
        if (orphans) {
            html += '<div class="turn turn--assistant"><div class="turn-label">Tool results <span class="role-sub">\u00B7 unpaired</span></div>' +
                    '<div class="substeps">' + orphans + '</div></div>';
        }
        return html;
    }

    /* component header (.tx-head) \u2014 title + neutral meta chips + close */
    function renderTxHead(interaction, messages){
        const fullTitle = interaction.summary || interaction.display || 'Interaction';
        const sid = interaction.session_id || '';
        const meta =
            '<div class="tx-meta">' +
                '<span>' + escapeHtml(formatTimestamp(interaction.timestamp)) + '</span><span class="dot">\u00B7</span>' +
                '<span><b>' + messages.length + '</b> messages</span><span class="dot">\u00B7</span>' +
                '<span><b>' + formatNumber(interaction.total_tokens) + '</b> tokens</span><span class="dot">\u00B7</span>' +
                '<span><b>$' + (interaction.cost_usd || 0).toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2}) + '</b></span><span class="dot">\u00B7</span>' +
                '<span>' + escapeHtml(shortenModel(interaction.model)) + '</span><span class="dot">\u00B7</span>' +
                '<button type="button" class="tx-session-id" data-full-id="' + escapeAttr(sid) + '" aria-label="Copy session ID" title="Click to copy session ID">' + escapeHtml(shortenSessionId(sid)) + '</button>' +
            '</div>';
        return '<div class="tx-head"><div class="tx-head-top">' +
            '<h2 class="tx-title" id="txDialogTitle" title="' + escapeAttr(fullTitle) + '">' + escapeHtml(fullTitle.slice(0, 80)) + '</h2>' +
            '<button class="tx-close" type="button" aria-label="Close">' + TX_ICONS.close + '</button>' +
            '</div>' + meta + '</div>';
    }

    /* MOUNT: render the component into a host; return refs for the shell.
       opts = { onClose, onOpenInteraction, copySessionId, container } */
    function mountTranscript(host, data, opts){
        opts = opts || {};
        const interaction = data.interaction || data;
        const messages = data.messages || [];
        const results = indexResults(messages);
        const consumed = new Set();

        const bodyInner = messages.length
            ? buildTranscriptBody(messages, results, consumed, interaction)
            : '<div class="empty-state"><h3>No messages in this interaction</h3></div>';

        host.innerHTML =
            '<div class="tx">' +
                renderTxHead(interaction, messages) +
                '<div class="tx-aux"></div>' +
                '<div class="tx-body">' + bodyInner + '</div>' +
            '</div>';

        const root = host.querySelector('.tx');
        const headEl = root.querySelector('.tx-head');
        const auxEl = root.querySelector('.tx-aux');
        const bodyEl = root.querySelector('.tx-body');

        // event-delegated wiring scoped to the component root
        function onClick(e){
            const sidEl = e.target.closest('.tx-session-id');
            if (sidEl) { if (opts.copySessionId) opts.copySessionId(sidEl); return; }
            if (e.target.closest('.tx-close')) { if (opts.onClose) opts.onClose(); return; }
            const navEl = e.target.closest('[data-nav-session]');
            if (navEl) {
                e.preventDefault();
                const s = navEl.getAttribute('data-nav-session');
                const p = navEl.getAttribute('data-nav-project');
                if (opts.onOpenInteraction) opts.onOpenInteraction(s, p || undefined);
                return;
            }
            const dHead = e.target.closest('.tx-derived-head');
            if (dHead) {
                const open = dHead.closest('.tx-derived').classList.toggle('open');
                dHead.setAttribute('aria-expanded', open ? 'true' : 'false');
                return;
            }
            const callBtn = e.target.closest('button.call-row');
            if (callBtn) {
                const card = callBtn.closest('.step-card');
                const open = card.classList.toggle('open');
                callBtn.setAttribute('aria-expanded', open ? 'true' : 'false');
                return;
            }
            const exp = e.target.closest('.result-expand');
            if (exp) {
                const pre = exp.parentElement.querySelector('.result-text');
                if (pre) pre.classList.remove('clamp');
                exp.remove();
                return;
            }
        }
        root.addEventListener('click', onClick);

        return { root: root, headEl: headEl, auxEl: auxEl, bodyEl: bodyEl,
                 destroy: function(){ root.removeEventListener('click', onClick); } };
    }

    // ===== POPUP SHELL \u2014 owns overlay/backdrop/ESC, fetches, KB band + tabs =====
    var _txMount = null;
    var _modalTrigger = null;
    var _openSeq = 0;

    async function openInteraction(sessionId, projectId) {
        var overlay = document.getElementById('modalOverlay');
        var host = document.getElementById('modalHost');
        var _seq = ++_openSeq;   // supersede any in-flight open (stale-render guard)
        // Only capture the page trigger on a fresh open. When openInteraction is
        // called from inside the modal (breadcrumb / derived nav) the modal is
        // already active, so we keep the original trigger for focus-return on close.
        if (!overlay.classList.contains('active')) { _modalTrigger = document.activeElement; }
        overlay.classList.add('active');
        // Destroy any previous mount BEFORE resetting host.innerHTML, so its delegated
        // listener is removed from a still-attached node and a concurrent open cannot
        // clobber a newly-mounted transcript when an earlier fetch resolves.
        if (_txMount) { _txMount.destroy(); _txMount = null; }
        host.innerHTML = '<div class="tx"><div class="tx-head"><div class="tx-head-top"><h2 class="tx-title" id="txDialogTitle">Loading transcript…</h2><button class="tx-close" type="button" aria-label="Close">' + TX_ICONS.close + '</button></div></div><div class="tx-body"><div class="loading">Loading transcript</div></div></div>';
        // Keep a close affordance during the fetch and move keyboard/AT focus onto it
        // (host has tabindex="-1"); otherwise focus would stay on the page trigger.
        var _loadClose = host.querySelector('.tx-close');
        if (_loadClose) { _loadClose.addEventListener('click', closeModal); _loadClose.focus(); } else { host.focus(); }

        try {
            var qs = projectId ? '?project=' + encodeURIComponent(projectId) : '';
            var convPromise = apiFetchRaw(API_BASE + '/api/interaction/' + encodeURIComponent(sessionId) + qs);
            var kbPromise = apiFetchRaw(API_BASE + '/api/kb/status?session_id=' + encodeURIComponent(sessionId)).catch(function() { return null; });
            var sqlMetaPromise = apiFetchRaw(API_BASE + '/api/interaction/' + encodeURIComponent(sessionId) + '/metadata' + qs).catch(function() { return null; });
            var results = await Promise.all([convPromise, kbPromise, sqlMetaPromise]);
            var data = results[0];
            var kbData = results[1];
            var sqlMeta = results[2];

            // guard: modal closed during the fetch, or a newer open superseded this one
            if (!overlay.classList.contains('active') || _seq !== _openSeq) return;

            // A concurrent open during this fetch may have set up a fresh mount; destroy
            // it before mounting so we never leak a listener (the loading-state reset
            // above already cleared the pre-open mount).
            if (_txMount) { _txMount.destroy(); _txMount = null; }
            _txMount = mountTranscript(host, data, {
                onClose: closeModal,
                onOpenInteraction: openInteraction,
                copySessionId: copySessionId,
                container: 'popup'
            });

            // fill the .tx-aux slot with shell chrome: KB band + Transcript/Cost tabs
            _txMount.auxEl.innerHTML =
                '<div class="kb-enrichment" id="kbEnrichment" style="display:none;"></div>' +
                '<div class="tx-tabs" role="tablist" aria-label="Transcript views">' +
                    '<button type="button" class="tx-tab active" id="txTabTranscript" role="tab" aria-selected="true" tabindex="0" aria-controls="txPanelTranscript" data-modal-tab="transcript">Transcript</button>' +
                    '<button type="button" class="tx-tab" id="txTabCost" role="tab" aria-selected="false" tabindex="-1" aria-controls="costProfileBody" data-modal-tab="cost">Cost</button>' +
                '</div>';

            // append the Cost panel after .tx-body, toggled by the tabs
            _txMount.bodyEl.id = 'txPanelTranscript';
            _txMount.bodyEl.setAttribute('data-modal-panel', 'transcript');
            _txMount.bodyEl.setAttribute('role', 'tabpanel');
            _txMount.bodyEl.setAttribute('aria-labelledby', 'txTabTranscript');
            _txMount.bodyEl.setAttribute('tabindex', '0');
            var costPanel = document.createElement('div');
            costPanel.id = 'costProfileBody';
            costPanel.className = 'tx-cost';
            costPanel.setAttribute('data-modal-panel', 'cost');
            costPanel.setAttribute('role', 'tabpanel');
            costPanel.setAttribute('aria-labelledby', 'txTabCost');
            costPanel.setAttribute('tabindex', '0');
            costPanel.style.display = 'none';
            _txMount.root.appendChild(costPanel);

            renderKbEnrichment(document.getElementById('kbEnrichment'), kbData, sqlMeta);
            renderCostProfile(document.getElementById('costProfileBody'), data.cost_profile);
            wireModalTabs(_txMount);

            var closeBtn = _txMount.headEl.querySelector('.tx-close');
            if (closeBtn) closeBtn.focus();
        } catch (err) {
            console.error('Failed to load interaction:', err);
            if (!overlay.classList.contains('active') || _seq !== _openSeq) return;
            host.innerHTML = '<div class="tx"><div class="tx-head"><div class="tx-head-top">' +
                '<h2 class="tx-title" id="txDialogTitle">Interaction</h2>' +
                '<button class="tx-close" type="button" aria-label="Close">' + TX_ICONS.close + '</button>' +
                '</div></div><div class="tx-body"><div class="empty-state"><h3>Error loading interaction</h3></div></div></div>';
            var eb = host.querySelector('.tx-close');
            if (eb) { eb.addEventListener('click', closeModal); eb.focus(); }
        }
    }

    function wireModalTabs(mount){
        var tabs = mount.auxEl.querySelectorAll('.tx-tab');
        var tabArr = Array.prototype.slice.call(tabs);
        var bodyEl = mount.bodyEl;
        var costEl = mount.root.querySelector('#costProfileBody');
        function activate(tab){
            tabs.forEach(function(t){ t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); t.setAttribute('tabindex', '-1'); });
            tab.classList.add('active');
            tab.setAttribute('aria-selected', 'true');
            tab.setAttribute('tabindex', '0');
            var target = tab.dataset.modalTab;
            bodyEl.style.display = (target === 'transcript') ? '' : 'none';
            if (costEl) costEl.style.display = (target === 'cost') ? '' : 'none';
        }
        tabArr.forEach(function(tab, idx){
            tab.addEventListener('click', function(){ activate(tab); });
            // ARIA tabs pattern: Left/Right (and Home/End) move between tabs
            tab.addEventListener('keydown', function(e){
                var next = null;
                if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { next = tabArr[(idx + 1) % tabArr.length]; }
                else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { next = tabArr[(idx - 1 + tabArr.length) % tabArr.length]; }
                else if (e.key === 'Home') { next = tabArr[0]; }
                else if (e.key === 'End') { next = tabArr[tabArr.length - 1]; }
                if (next) { e.preventDefault(); activate(next); next.focus(); }
            });
        });
    }

    function closeModal(){
        var overlay = document.getElementById('modalOverlay');
        overlay.classList.remove('active');
        if (_txMount) { _txMount.destroy(); _txMount = null; }
        if (_costProfileChart) { _costProfileChart.destroy(); _costProfileChart = null; }
        if (_modalTrigger && _modalTrigger.focus) { try { _modalTrigger.focus(); } catch (_) {} }
        _modalTrigger = null;
    }

    function trapModalFocus(e){
        var host = document.getElementById('modalHost');
        var nodes = host.querySelectorAll('button, a[href], input, select, textarea, [tabindex]:not([tabindex="-1"])');
        var list = Array.prototype.filter.call(nodes, function(el){ return el.offsetParent !== null && !el.disabled && el.getAttribute('tabindex') !== '-1'; });
        if (!list.length) { e.preventDefault(); return; }
        var first = list[0], last = list[list.length - 1];
        if (e.shiftKey) {
            if (document.activeElement === first || !host.contains(document.activeElement)) { e.preventDefault(); last.focus(); }
        } else {
            if (document.activeElement === last || !host.contains(document.activeElement)) { e.preventDefault(); first.focus(); }
        }
    }

    function renderKbEnrichment(el, kbData, sqlMeta) {
        el.textContent = '';
        el.style.display = 'none';

        // Use Qdrant data if available, otherwise fall back to SQL metadata
        var p = null;
        var sourceLabel = '';
        if (kbData && kbData.indexed && kbData.payload) {
            p = kbData.payload;
            sourceLabel = 'Qdrant KB';
        } else if (sqlMeta && sqlMeta.classified && sqlMeta.metadata) {
            p = sqlMeta.metadata;
            sourceLabel = 'SQL Classification';
        }

        if (!p) return;
        el.style.display = 'block';

        if (p.summary) {
            var summaryDiv = document.createElement('div');
            summaryDiv.className = 'kb-enrichment-summary';
            summaryDiv.textContent = p.summary;
            el.appendChild(summaryDiv);
        }

        if (p.abstract) {
            var abstractDiv = document.createElement('div');
            abstractDiv.className = 'kb-enrichment-abstract';
            abstractDiv.textContent = p.abstract;
            el.appendChild(abstractDiv);
        }

        if (p.process) {
            var processDiv = document.createElement('div');
            processDiv.className = 'kb-enrichment-process';
            processDiv.textContent = p.process;
            el.appendChild(processDiv);
        }

        var metaDiv = document.createElement('div');
        metaDiv.className = 'kb-enrichment-meta';

        if (sourceLabel) {
            var srcSpan2 = document.createElement('span');
            srcSpan2.style.cssText = 'font-size:0.65rem;color:#999;font-style:italic';
            srcSpan2.textContent = sourceLabel;
            metaDiv.appendChild(srcSpan2);
        }

        if (p.classification) {
            var classSpan = document.createElement('span');
            classSpan.className = 'kb-enrichment-classification ' + p.classification;
            classSpan.textContent = p.classification;
            metaDiv.appendChild(classSpan);
        }

        if (p.data_sensitivity) {
            var sensSpan = document.createElement('span');
            sensSpan.className = 'kb-sensitivity ' + p.data_sensitivity;
            sensSpan.textContent = p.data_sensitivity;
            if (p.sensitive_data_types && p.sensitive_data_types.length > 0) {
                sensSpan.title = p.sensitive_data_types.join(', ');
            }
            metaDiv.appendChild(sensSpan);
        }

        if (p.host) {
            var hostSpan = document.createElement('span');
            hostSpan.textContent = p.host;
            metaDiv.appendChild(hostSpan);
        }

        if (p.source) {
            var srcSpan = document.createElement('span');
            srcSpan.textContent = p.source;
            metaDiv.appendChild(srcSpan);
        }

        el.appendChild(metaDiv);

        var tagsDiv = document.createElement('div');
        tagsDiv.className = 'kb-enrichment-tags';
        var hasTags = false;

        ['topics', 'clients', 'people', 'tags'].forEach(function(key) {
            var arr = p[key];
            if (arr && arr.length > 0) {
                hasTags = true;
                arr.forEach(function(t) {
                    var tagSpan = document.createElement('span');
                    tagSpan.className = key === 'topics' ? 'kb-tag topic' :
                                        key === 'clients' ? 'kb-tag client' :
                                        key === 'people' ? 'kb-tag person' : 'kb-tag';
                    tagSpan.textContent = t;
                    tagsDiv.appendChild(tagSpan);
                });
            }
        });

        if (hasTags) el.appendChild(tagsDiv);
    }

    // ===== MODAL EVENT HANDLERS (shell-owned: backdrop, ESC, focus trap) =====
    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    document.addEventListener('keydown', function(e) {
        var overlay = document.getElementById('modalOverlay');
        if (!overlay.classList.contains('active')) return;
        if (e.key === 'Escape') { closeModal(); return; }
        if (e.key === 'Tab') { trapModalFocus(e); }
    });

    var _costProfileChart = null;

    function renderCostProfile(el, costProfile) {
        el.textContent = '';

        if (!costProfile) {
            el.insertAdjacentHTML('beforeend', '<div class="empty-state"><h3>No token data available for this session</h3></div>');
            return;
        }

        var s = costProfile.summary;
        var avgPerCall = s.api_calls > 0 ? (s.cost_usd / s.api_calls).toFixed(4) : '0';

        // Summary cards
        el.insertAdjacentHTML('beforeend',
            '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 12px; margin-bottom: 20px;">' +
            '<div style="background: #FFFFFF; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);"><div style="font-size: 1.4rem; font-weight: 700; color: #00D35D;">$' + (s.cost_usd || 0).toFixed(2) + '</div><div style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Total Cost</div></div>' +
            '<div style="background: #FFFFFF; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);"><div style="font-size: 1.4rem; font-weight: 700; color: #004BFF;">' + (s.duration_minutes || 0) + 'm</div><div style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Duration</div></div>' +
            '<div style="background: #FFFFFF; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);"><div style="font-size: 1.4rem; font-weight: 700; color: #004BFF;">' + (s.api_calls || 0) + '</div><div style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">API Calls</div></div>' +
            '<div style="background: #FFFFFF; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);"><div style="font-size: 1.4rem; font-weight: 700; color: #000;">' + (s.models || []).join(', ') + '</div><div style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Model(s)</div></div>' +
            '<div style="background: #FFFFFF; border-radius: 12px; padding: 16px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.06);"><div style="font-size: 1.4rem; font-weight: 700; color: #004BFF;">$' + avgPerCall + '</div><div style="font-size: 0.75rem; color: #666; text-transform: uppercase; letter-spacing: 0.5px;">Avg Cost/Call</div></div>' +
            '</div>'
        );

        // Cumulative cost chart
        var timeline = costProfile.timeline || [];
        if (timeline.length > 0) {
            var canvasWrap = document.createElement('div');
            canvasWrap.style.cssText = 'background: #FFFFFF; border-radius: 16px; padding: 24px; margin-bottom: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06);';
            canvasWrap.insertAdjacentHTML('beforeend', '<div style="font-size: 1rem; font-weight: 700; margin-bottom: 16px;">Cumulative Cost Timeline</div>');
            var canvas = document.createElement('canvas');
            canvas.id = 'costTimelineChart';
            canvasWrap.appendChild(canvas);
            el.appendChild(canvasWrap);

            if (_costProfileChart) { _costProfileChart.destroy(); _costProfileChart = null; }
            var models = [...new Set(timeline.map(function(t) { return t.model; }))];
            var multiModel = models.length > 1;
            var modelColors = { };
            var palette = ['#004BFF', '#00D35D', '#FF7A20', '#FF4C53', '#6E87FF', '#F9C927'];
            models.forEach(function(m, i) { modelColors[m] = palette[i % palette.length]; });

            _costProfileChart = new Chart(canvas.getContext('2d'), {
                type: 'line',
                data: {
                    labels: timeline.map(function(t, i) { return '#' + (i + 1); }),
                    datasets: [{
                        label: 'Cumulative Cost ($)',
                        data: timeline.map(function(t) { return t.cumulative_cost; }),
                        borderColor: '#00D35D',
                        backgroundColor: 'rgba(0, 211, 93, 0.08)',
                        fill: true,
                        tension: 0.3,
                        pointRadius: timeline.length > 50 ? 0 : 3,
                        pointBackgroundColor: multiModel ? timeline.map(function(t) { return modelColors[t.model] || '#004BFF'; }) : '#00D35D',
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                title: function(ctx) { var idx = ctx[0].dataIndex; return timeline[idx].timestamp; },
                                afterLabel: function(ctx) { var t = timeline[ctx.dataIndex]; return t.model + ' | Cost: $' + (t.cost_usd || 0).toFixed(4); }
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: 'Cumulative $' } },
                        x: { ticks: { maxTicksLimit: 15 } }
                    }
                }
            });
        }

        // Message-level detail table
        if (timeline.length > 0) {
            var phases = costProfile.phases || {};
            var third = Math.max(Math.floor(timeline.length / 3), 1);
            var phaseColors = { early: '#004BFF', mid: '#FF7A20', late: '#00D35D' };

            // Totals summary (token + USD cost per category) — shown above the message table
            var tk = s.tokens || {};
            var ct = s.cost || {};
            var totTokens = (tk.total != null) ? tk.total : ((tk.input || 0) + (tk.output || 0) + (tk.cache_creation || 0) + (tk.cache_read || 0));
            var totalRows = [
                ['Input', tk.input, ct.input],
                ['Output', tk.output, ct.output],
                ['Cache In (write)', tk.cache_creation, ct.cache_write],
                ['Cache Out (read)', tk.cache_read, ct.cache_read]
            ];
            var totHtml = '<div style="background: #FFFFFF; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; overflow-x: auto;">';
            totHtml += '<div style="font-size: 1rem; font-weight: 700; margin-bottom: 16px;">Totals</div>';
            totHtml += '<table style="width: 100%; border-collapse: collapse; font-size: 0.85rem;">';
            totHtml += '<thead><tr style="border-bottom: 1px solid #F2F2F2; color: #666;"><th style="padding: 8px; text-align: left;">Category</th><th style="padding: 8px; text-align: right;">Tokens</th><th style="padding: 8px; text-align: right;">Cost (USD)</th></tr></thead><tbody>';
            totalRows.forEach(function(r) {
                totHtml += '<tr style="border-bottom: 1px solid #F2F2F2;">';
                totHtml += '<td style="padding: 8px;">' + r[0] + '</td>';
                totHtml += '<td style="padding: 8px; text-align: right; color: #666;">' + (r[1] || 0).toLocaleString() + '</td>';
                totHtml += '<td style="padding: 8px; text-align: right; color: #00D35D;">$' + (r[2] || 0).toFixed(4) + '</td>';
                totHtml += '</tr>';
            });
            totHtml += '<tr style="border-top: 2px solid #E5E5E5; font-weight: 700;">';
            totHtml += '<td style="padding: 8px;">TOTAL</td>';
            totHtml += '<td style="padding: 8px; text-align: right;">' + totTokens.toLocaleString() + '</td>';
            totHtml += '<td style="padding: 8px; text-align: right; color: #00D35D;">$' + (ct.total || 0).toFixed(4) + '</td>';
            totHtml += '</tr>';
            totHtml += '</tbody></table></div>';
            el.insertAdjacentHTML('beforeend', totHtml);

            var tblHtml = '<div style="background: #FFFFFF; border-radius: 16px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); overflow-x: auto;">';
            tblHtml += '<div style="font-size: 1rem; font-weight: 700; margin-bottom: 16px;">Message-Level Detail';
            if (phases.early) tblHtml += ' <span style="font-size: 0.75rem; color: #666; font-weight: 400;">(Phases: <span style="color: #004BFF;">early ' + phases.early.pct + '%</span> / <span style="color: #FF7A20;">mid ' + phases.mid.pct + '%</span> / <span style="color: #00D35D;">late ' + phases.late.pct + '%</span>)</span>';
            tblHtml += '</div>';
            tblHtml += '<table style="width: 100%; border-collapse: collapse; font-size: 0.78rem;">';
            tblHtml += '<thead><tr style="border-bottom: 1px solid #F2F2F2; color: #666;">';
            tblHtml += '<th style="padding: 6px; text-align: left;">#</th><th style="padding: 6px; text-align: left;">Timestamp</th><th style="padding: 6px; text-align: left;">Model</th><th style="padding: 6px; text-align: right;">Input</th><th style="padding: 6px; text-align: right;">Output</th><th style="padding: 6px; text-align: right;">Cache Write</th><th style="padding: 6px; text-align: right;">Cache Read</th><th style="padding: 6px; text-align: right;">Cost</th><th style="padding: 6px; text-align: right;">Cumulative</th>';
            tblHtml += '</tr></thead><tbody>';

            timeline.forEach(function(t, i) {
                var phase = i < third ? 'early' : (i < 2 * third ? 'mid' : 'late');
                var bColor = phaseColors[phase];
                tblHtml += '<tr style="border-bottom: 1px solid #F2F2F2; border-left: 3px solid ' + bColor + ';">';
                tblHtml += '<td style="padding: 6px; color: #999;">' + (i + 1) + '</td>';
                tblHtml += '<td style="padding: 6px; color: #666; font-size: 0.72rem;">' + (t.timestamp || '').replace('T', ' ').slice(0, 19) + '</td>';
                tblHtml += '<td style="padding: 6px;">' + (t.model || '').replace(/^claude-/, '').slice(0, 20) + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; color: #666;">' + (t.input_tokens || 0).toLocaleString() + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; color: #666;">' + (t.output_tokens || 0).toLocaleString() + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; color: #666;">' + (t.cache_creation_tokens || 0).toLocaleString() + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; color: #666;">' + (t.cache_read_tokens || 0).toLocaleString() + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; color: #00D35D;">$' + (t.cost_usd || 0).toFixed(4) + '</td>';
                tblHtml += '<td style="padding: 6px; text-align: right; font-weight: 600;">$' + (t.cumulative_cost || 0).toFixed(4) + '</td>';
                tblHtml += '</tr>';
            });

            tblHtml += '</tbody></table></div>';
            el.insertAdjacentHTML('beforeend', tblHtml);
        }
    }

    // ===== COPY SESSION ID =====
    function copySessionId(element) {
        const fullId = element.dataset.fullId;
        if (!fullId) return;

        const showFeedback = (ok) => {
            const original = element.textContent;
            element.textContent = ok ? 'Copied' : 'Copy failed';
            element.style.background = ok ? 'var(--surface-2)' : 'var(--error-bg)';
            element.style.color = ok ? 'var(--muted)' : 'var(--error)';
            setTimeout(() => {
                element.textContent = original;
                element.style.background = '';
                element.style.color = '';
            }, 1500);
        };

        const fallbackCopy = () => {
            // Works in non-secure contexts (e.g. http://hostname over LAN) where navigator.clipboard is undefined/blocked.
            const ta = document.createElement('textarea');
            ta.value = fullId;
            ta.setAttribute('readonly', '');
            ta.style.position = 'fixed';
            ta.style.top = '-1000px';
            ta.style.opacity = '0';
            document.body.appendChild(ta);
            ta.select();
            let ok = false;
            try { ok = document.execCommand('copy'); } catch (_) { ok = false; }
            document.body.removeChild(ta);
            showFeedback(ok);
        };

        if (navigator.clipboard && window.isSecureContext) {
            navigator.clipboard.writeText(fullId).then(
                () => showFeedback(true),
                () => fallbackCopy()
            );
        } else {
            fallbackCopy();
        }
    }

    // ===== INITIAL LOAD =====
    async function init() {
        // Set default date inputs to match state (last 7 days)
        document.getElementById('startDate').value = state.startDate;
        document.getElementById('endDate').value = state.endDate;
        initColumnToggle();
        await initFilters();
        await loadInteractions();

        // Auto-open interaction if ?session=XXX is in URL (e.g. from KB search results)
        var urlParams = new URLSearchParams(window.location.search);
        var sessionParam = urlParams.get('session');
        if (sessionParam) {
            openInteraction(sessionParam);
        }
    }

    init();

    // Sync button
    document.getElementById('navSyncBtn').addEventListener('click', async function() {
        const btn = this;
        btn.classList.add('syncing');
        btn.textContent = 'Syncing...';
        try {
            await fetch('/api/sync', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({scope:'all'}) });
            btn.textContent = 'Done!';
            setTimeout(() => { btn.textContent = 'Sync'; btn.classList.remove('syncing'); location.reload(); }, 2000);
        } catch(e) {
            btn.textContent = 'Failed';
            setTimeout(() => { btn.textContent = 'Sync'; btn.classList.remove('syncing'); }, 2000);
        }
    });
    </script>
