<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>LAV Transcript — Calm Bubbles</title>
<!--
  ============================================================================
  LocalAgentViewer · Transcript restyle
  DIRECTION: "Calm Bubbles"
  ----------------------------------------------------------------------------
  A muted messaging layout. User turns align right in a subtle brand-tinted
  bubble; assistant turns align left on plain surface. Thinking + tool activity
  render as compact "attachment" cards stacked beneath the assistant bubble
  (icon + name + 1-line preview), grouped on a rail so the ordered sub-turn
  sequence reads clearly. Each tool_use is bound to its tool_result inside the
  SAME card. Encrypted/empty thinking is an inline pill — no disclosure.
  Only ONE accent (brand #004BFF) on the user bubble + active controls; errors
  tint a single card red (#DC2626). Neutrals carry all other hierarchy.

  The .transcript component is container-agnostic: the SAME node is reused by
  two shells — Popup (centered ~860px overlay) and Docked (right side panel,
  full height ~420px) — toggled from the header. This proves dockability.
  Single file · inline CSS · vanilla JS · no libraries · no build.
  ============================================================================
-->
<style>
  :root {
    /* neutrals carry hierarchy */
    --white: #FFFFFF;
    --surface: #F7F8FA;
    --surface-2: #F0F2F5;
    --border: #E6E8EB;
    --text: #1A1D21;
    --muted: #6B7280;
    --muted-2: #9AA1AC;
    /* meaning-only color */
    --accent: #004BFF;
    --accent-soft: #EAF0FF;
    --accent-border: #C9D8FF;
    --danger: #DC2626;
    --danger-soft: #FDECEC;
    --danger-border: #F4C9C9;
    /* rhythm */
    --r-1: 4px;
    --r-2: 8px;
    --r-3: 12px;
    --r-4: 16px;
    --r-5: 24px;
    --r-6: 32px;
    --radius: 12px;
    --radius-sm: 8px;
    --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas, monospace;
    --sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    height: 100%;
  }

  body {
    font-family: var(--sans);
    color: var(--text);
    background: var(--surface-2);
    font-size: 14px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ---------- page scaffold (demo backdrop) ---------- */
  .page {
    min-height: 100%;
    padding: var(--r-6);
    display: flex;
    flex-direction: column;
    gap: var(--r-4);
    transition: padding-right .28s ease;
  }
  .page.docked-open { padding-right: 460px; }

  .page-head h1 {
    font-size: 18px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .page-head p {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    max-width: 60ch;
  }
  .demo-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: var(--r-5);
    max-width: 720px;
  }
  .demo-card .open-btn {
    margin-top: var(--r-3);
  }

  /* ---------- buttons ---------- */
  .btn {
    font-family: inherit;
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 7px 14px;
    cursor: pointer;
    transition: background .15s, border-color .15s, box-shadow .15s;
  }
  .btn:hover { background: var(--surface); }
  .btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
    border-color: var(--accent-border);
  }
  .btn.primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn.primary:hover { background: #003ad0; }

  /* ---------- segmented toggle ---------- */
  .seg {
    display: inline-flex;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 3px;
    gap: 2px;
  }
  .seg button {
    font-family: inherit;
    font-size: 12.5px;
    font-weight: 500;
    color: var(--muted);
    background: transparent;
    border: 0;
    border-radius: 999px;
    padding: 5px 13px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: background .15s, color .15s, box-shadow .15s;
  }
  .seg button:hover { color: var(--text); }
  .seg button[aria-pressed="true"] {
    background: var(--white);
    color: var(--accent);
    box-shadow: 0 1px 2px rgba(16,24,40,.08);
  }
  .seg button:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .seg svg { width: 14px; height: 14px; }

  /* ============================================================
     SHELLS — Popup overlay + Docked panel.
     Both host the SAME .transcript node.
     ============================================================ */

  /* Popup overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(17, 20, 24, .42);
    backdrop-filter: blur(2px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: var(--r-5);
    z-index: 50;
    opacity: 0;
    pointer-events: none;
    transition: opacity .2s ease;
  }
  .overlay.active { opacity: 1; pointer-events: auto; }

  .shell {
    background: var(--white);
    border: 1px solid var(--border);
    box-shadow: 0 24px 60px -12px rgba(16,24,40,.32);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  /* popup geometry */
  .overlay .shell {
    width: 100%;
    max-width: 860px;
    max-height: 88vh;
    border-radius: 16px;
    transform: translateY(8px) scale(.99);
    transition: transform .2s ease;
  }
  .overlay.active .shell { transform: none; }

  /* docked geometry */
  .dock {
    position: fixed;
    top: 0;
    right: 0;
    height: 100vh;
    width: 420px;
    z-index: 50;
    transform: translateX(100%);
    transition: transform .28s ease;
    pointer-events: none;
  }
  .dock.active { transform: none; pointer-events: auto; }
  .dock .shell {
    height: 100%;
    width: 100%;
    max-height: none;
    border-radius: 0;
    border-top: 0;
    border-right: 0;
    border-bottom: 0;
    box-shadow: -16px 0 48px -24px rgba(16,24,40,.30);
  }

  /* ---------- shell header ---------- */
  .shell-head {
    flex: 0 0 auto;
    display: flex;
    align-items: flex-start;
    gap: var(--r-3);
    padding: 16px 18px 14px;
    border-bottom: 1px solid var(--border);
    background: var(--white);
  }
  .shell-head .title-wrap { flex: 1 1 auto; min-width: 0; }
  .shell-head h2 {
    font-size: 15px;
    margin: 0;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .meta-row {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin-top: 6px;
    color: var(--muted);
    font-size: 12px;
  }
  .meta-row .dot { color: var(--muted-2); }
  .meta-row .model {
    font-family: var(--mono);
    font-size: 11.5px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 1px 8px;
    color: var(--text);
  }
  .head-controls {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .icon-btn {
    width: 30px;
    height: 30px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    border-radius: var(--radius-sm);
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    cursor: pointer;
    transition: background .15s, color .15s;
  }
  .icon-btn:hover { background: var(--surface); color: var(--text); }
  .icon-btn:focus-visible {
    outline: none;
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .icon-btn svg { width: 17px; height: 17px; }

  /* ============================================================
     TRANSCRIPT COMPONENT (container-agnostic)
     ============================================================ */
  .transcript {
    flex: 1 1 auto;
    overflow-y: auto;
    padding: var(--r-5) var(--r-5) var(--r-6);
    display: flex;
    flex-direction: column;
    gap: var(--r-5);
    background: var(--white);
    scroll-behavior: smooth;
  }
  /* tighter padding when docked-narrow */
  .dock .transcript { padding: var(--r-4) var(--r-4) var(--r-5); gap: var(--r-4); }

  /* turn block */
  .turn { display: flex; flex-direction: column; gap: 8px; }
  .turn.user { align-items: flex-end; }
  .turn.assistant { align-items: stretch; }

  .turn-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--muted-2);
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 0 2px;
  }
  .turn.user .turn-label { color: var(--accent); justify-content: flex-end; }
  .turn-label .av {
    width: 16px; height: 16px;
    border-radius: 5px;
    display: inline-flex; align-items: center; justify-content: center;
    background: var(--surface-2);
    color: var(--muted);
  }
  .turn.user .turn-label .av { background: var(--accent-soft); color: var(--accent); }
  .turn-label .av svg { width: 11px; height: 11px; }

  /* bubbles */
  .bubble {
    max-width: 86%;
    border-radius: 14px;
    padding: 11px 14px;
    font-size: 14px;
    line-height: 1.55;
    word-wrap: break-word;
    overflow-wrap: anywhere;
  }
  .bubble p { margin: 0 0 .55em; }
  .bubble p:last-child { margin-bottom: 0; }
  .bubble code {
    font-family: var(--mono);
    font-size: .86em;
    background: rgba(16,24,40,.06);
    border-radius: 4px;
    padding: 1px 5px;
  }

  .turn.user .bubble {
    background: var(--accent-soft);
    border: 1px solid var(--accent-border);
    color: #102a66;
    border-bottom-right-radius: 5px;
  }
  .turn.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-bottom-left-radius: 5px;
    align-self: flex-start;
  }

  /* ---------- sub-turn rail (attachments under assistant bubble) ---------- */
  .substeps {
    align-self: flex-start;
    max-width: 86%;
    width: 100%;
    margin-left: 11px;
    padding-left: 16px;
    border-left: 2px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-top: 2px;
  }
  .dock .substeps { max-width: 100%; }

  /* attachment card */
  .attach {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    transition: border-color .15s, box-shadow .15s;
  }
  .attach:hover { border-color: #D6DAE0; }
  .attach.error { border-color: var(--danger-border); background: var(--danger-soft); }

  .attach-head {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 9px 11px;
    width: 100%;
    text-align: left;
    background: transparent;
    border: 0;
    font-family: inherit;
    font-size: 13px;
    color: var(--text);
    cursor: default;
  }
  .attach-head.clickable { cursor: pointer; }
  .attach-head.clickable:hover { background: var(--surface); }
  .attach.error .attach-head.clickable:hover { background: #fbe1e1; }
  .attach-head:focus-visible {
    outline: none;
    box-shadow: inset 0 0 0 2px var(--accent-soft);
  }

  .attach-icon {
    flex: 0 0 auto;
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--surface-2);
    color: var(--muted);
    display: inline-flex;
    align-items: center;
    justify-content: center;
  }
  .attach-icon svg { width: 13px; height: 13px; }
  .attach.error .attach-icon { background: #f7d6d6; color: var(--danger); }

  .attach-name {
    flex: 0 0 auto;
    font-weight: 600;
    font-size: 12.5px;
  }
  .attach-meta {
    flex: 1 1 auto;
    min-width: 0;
    color: var(--muted);
    font-size: 12px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-family: var(--mono);
  }
  .attach.error .attach-meta { color: var(--danger); font-family: var(--sans); }

  .attach-size {
    flex: 0 0 auto;
    color: var(--muted-2);
    font-size: 11px;
    font-variant-numeric: tabular-nums;
  }
  .attach-chev {
    flex: 0 0 auto;
    color: var(--muted-2);
    width: 14px; height: 14px;
    transition: transform .18s ease;
  }
  .attach-head[aria-expanded="true"] .attach-chev { transform: rotate(90deg); }

  /* expandable body */
  .attach-body {
    display: none;
    border-top: 1px solid var(--border);
    background: var(--surface);
  }
  .attach-body.open { display: block; }
  .attach.error .attach-body { border-top-color: var(--danger-border); background: #fff5f5; }

  .attach-body .section { padding: 10px 12px; }
  .attach-body .section + .section { border-top: 1px dashed var(--border); }
  .attach-body .lbl {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--muted-2);
    margin-bottom: 5px;
  }
  pre.code {
    margin: 0;
    font-family: var(--mono);
    font-size: 12px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-break: break-word;
    color: var(--text);
    max-height: 280px;
    overflow: auto;
  }

  /* the tool_use -> tool_result divider rail inside one card */
  .res-block {
    border-top: 1px solid var(--border);
    padding: 9px 11px;
    display: flex;
    align-items: center;
    gap: 9px;
    background: var(--surface);
  }
  .attach.error .res-block { border-top-color: var(--danger-border); background: #fff5f5; }
  .res-block .res-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .03em;
    text-transform: uppercase;
    color: var(--muted-2);
    flex: 0 0 auto;
  }
  .res-block .res-preview {
    flex: 1 1 auto;
    min-width: 0;
    font-family: var(--mono);
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .attach.error .res-block .res-preview { color: var(--danger); font-family: var(--sans); }
  .res-block .ok-tick {
    flex: 0 0 auto;
    color: #1f7a43;
    width: 14px; height: 14px;
  }
  .res-block.error .ok-tick { color: var(--danger); }

  /* ---------- inline thinking pill (NO disclosure) ---------- */
  .think-inline {
    align-self: flex-start;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 5px 11px 5px 9px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 999px;
    color: var(--muted);
    font-size: 12px;
    font-style: italic;
  }
  .think-inline svg { width: 12px; height: 12px; color: var(--muted-2); flex: 0 0 auto; }
  .think-inline .label { font-style: normal; font-weight: 600; color: var(--muted-2); letter-spacing: .02em; }

  /* footer */
  .shell-foot {
    flex: 0 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 16px;
    border-top: 1px solid var(--border);
    background: var(--white);
    color: var(--muted);
    font-size: 12px;
  }
  .shell-foot .hint { display: flex; align-items: center; gap: 6px; }
  kbd {
    font-family: var(--mono);
    font-size: 11px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-bottom-width: 2px;
    border-radius: 5px;
    padding: 1px 6px;
    color: var(--text);
  }

  @media (max-width: 560px) {
    .overlay .shell { max-height: 92vh; border-radius: 12px; }
    .dock { width: 100vw; }
    .page.docked-open { padding-right: var(--r-6); }
    .bubble, .substeps { max-width: 100%; }
  }
</style>
</head>
<body>

<div class="page" id="page">
  <div class="page-head">
    <h1>LocalAgentViewer — Transcript</h1>
    <p>Direction &ldquo;Calm Bubbles&rdquo;. Restrained palette, ordered sub-turns bound to their results, and one reusable transcript component that lives in both a popup overlay and a docked side panel.</p>
  </div>

  <div class="demo-card">
    <h2 style="margin:0 0 4px; font-size:15px;">Restyle del popup chat — troppo colore</h2>
    <p style="margin:0; color:var(--muted); font-size:13px;">6 messages · opus-4-8 · 2026-06-27 14:02</p>
    <div class="open-btn">
      <button class="btn primary" id="openBtn">Open transcript</button>
    </div>
  </div>
</div>

<!-- POPUP SHELL -->
<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="shellTitle">
  <div class="shell" id="popupShell"></div>
</div>

<!-- DOCK SHELL -->
<div class="dock" id="dock" role="complementary" aria-label="Transcript panel">
  <div class="shell" id="dockShell"></div>
</div>

<!-- ============================================================
     The transcript component lives here as a template and is
     MOVED (the same DOM node) into whichever shell is active.
     ============================================================ -->
<template id="transcriptTpl">
  <div class="shell-inner" style="display:flex; flex-direction:column; height:100%;">
    <header class="shell-head">
      <div class="title-wrap">
        <h2 id="shellTitle">Restyle del popup chat — troppo colore</h2>
        <div class="meta-row">
          <span>2026-06-27 14:02</span>
          <span class="dot">·</span>
          <span>6 messages</span>
          <span class="dot">·</span>
          <span>18,420 tokens</span>
          <span class="dot">·</span>
          <span>$0.41</span>
          <span class="model">opus-4-8</span>
        </div>
      </div>
      <div class="head-controls">
        <div class="seg" role="group" aria-label="Display mode">
          <button id="modePopup" aria-pressed="true" onclick="setMode('popup')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
            Popup
          </button>
          <button id="modeDock" aria-pressed="false" onclick="setMode('dock')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><line x1="15" y1="4" x2="15" y2="20"/></svg>
            Docked
          </button>
        </div>
        <button class="icon-btn" aria-label="Close" onclick="closeTranscript()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
    </header>

    <main class="transcript" id="transcriptScroll"><!-- rendered turns injected here --></main>

    <footer class="shell-foot">
      <span class="hint">
        <svg viewBox="0 0 24 24" width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/></svg>
        Tool steps collapse with a one-line preview
      </span>
      <span class="hint"><kbd>Esc</kbd> to close</span>
    </footer>
  </div>
</template>

<script>
/* ============================================================
   SAMPLE DATA — rendered exactly, in order.
   ============================================================ */
const TRANSCRIPT = {
  messages: [
    {
      role: "user",
      content: [
        { type: "text", text: "Il popup della chat e troppo colorato e confuso. Puoi controllare come viene renderizzato un turn e dirmi quali file sono coinvolti?" }
      ]
    },
    {
      role: "assistant", tokens_in: 9100, tokens_out: 340,
      content: [
        { type: "thinking", thinking: "" },
        { type: "text", text: "Apro il file e controllo la struttura del rendering dei turn e dei sotto-turn." },
        { type: "tool_use", id: "tu_01", name: "Read",
          input: { file_path: "lav/static/interactions.html", offset: 1787, limit: 60, description: "Read renderInteractionDetail" } },
        { type: "tool_use", id: "tu_02", name: "Bash",
          input: { command: "grep -n \"tool-call\\|thinking-block\" lav/static/interactions.html", description: "Find color classes" } }
      ]
    },
    {
      role: "user",
      content: [
        { type: "tool_result", tool_use_id: "tu_01", is_error: false,
          content: "function renderInteractionDetail(data){\n  const messages = data.messages || [];\n  messages.forEach(function(msg, idx){\n    const items = parseMessageContent(msg.content);\n    // ... renders text / thinking / tool_use / tool_result flat\n  });\n}" },
        { type: "tool_result", tool_use_id: "tu_02", is_error: false,
          content: "596:        .tool-call { border-left: 3px solid #3498db; }\n556:        .thinking-block { border-left: 3px solid #9b59b6; }" }
      ]
    },
    {
      role: "assistant", tokens_in: 9500, tokens_out: 210,
      content: [
        { type: "text", text: "Trovato: tutto il rendering e inline in interactions.html e ogni tipo ha il suo colore. Provo a editare un blocco di prova." },
        { type: "tool_use", id: "tu_03", name: "Edit",
          input: { file_path: "lav/static/interactions.html",
            old_string: ".tool-call { border-left: 3px solid #3498db; }",
            new_string: ".tool-call { border-left: 3px solid var(--border); }",
            description: "Neutralize tool color" } }
      ]
    },
    {
      role: "user",
      content: [
        { type: "tool_result", tool_use_id: "tu_03", is_error: true,
          content: "Error: File has not been read in this session yet. Read it first before editing." }
      ]
    },
    {
      role: "assistant", tokens_in: 9800, tokens_out: 90,
      content: [
        { type: "text", text: "Ok, prima rileggo il file e poi applico la modifica. Procedo con il restyle completo della palette." }
      ]
    }
  ]
};

/* ---------- icons ---------- */
const ICONS = {
  Read:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>',
  Bash:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="4 17 10 11 4 5"/><line x1="12" y1="19" x2="20" y2="19"/></svg>',
  Edit:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>',
  Grep:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>',
  _default: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a4 4 0 0 0-5.4 5.4L3 18v3h3l6.3-6.3a4 4 0 0 0 5.4-5.4l-2.3 2.3-2-2z"/></svg>',
  think: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A6.5 6.5 0 0 1 16 8.5c0 1.6-.6 3-1.5 4.1V16a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-3.4A6.5 6.5 0 0 1 9.5 2z"/><line x1="9" y1="20" x2="13" y2="20"/><line x1="10" y1="22" x2="12" y2="22"/></svg>',
  user:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>',
  agent: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="8" width="16" height="12" rx="2"/><path d="M12 8V4"/><circle cx="9" cy="14" r="1"/><circle cx="15" cy="14" r="1"/></svg>',
  ok:    '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>',
  err:   '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>',
  chev:  '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>'
};
function toolIcon(name){ return ICONS[name] || ICONS._default; }

/* ---------- helpers ---------- */
function esc(s){ return String(s == null ? '' : s)
  .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
  .replace(/"/g,'&quot;'); }
function lineCount(s){ return String(s || '').split('\n').length; }
function firstLine(s){ return String(s || '').split('\n')[0]; }
let _id = 0;
function uid(){ return 'x' + (++_id); }

/* Build readable input preview (skip description, which is shown on the head) */
function inputJson(input){
  if (!input) return '';
  const clone = {};
  for (const k in input) if (k !== 'description') clone[k] = input[k];
  return JSON.stringify(clone, null, 2);
}
/* one-line summary of a tool input for the collapsed head */
function inputSummary(item){
  const i = item.input || {};
  if (item.name === 'Read') return i.file_path + (i.offset != null ? '  L' + i.offset + '–' + (i.offset + (i.limit||0)) : '');
  if (item.name === 'Bash') return i.command || '';
  if (item.name === 'Edit') return i.file_path || '';
  return Object.keys(i).filter(k=>k!=='description').map(k=>k+'='+i[k]).join(' ');
}

/* find the tool_result for a tool_use across the whole transcript */
function findResult(toolUseId){
  for (const m of TRANSCRIPT.messages){
    if (m.role !== 'user') continue;
    for (const c of (m.content||[])){
      if (c.type === 'tool_result' && c.tool_use_id === toolUseId) return c;
    }
  }
  return null;
}

/* ---------- renderers ---------- */

/* inline encrypted thinking — single muted line, NO disclosure */
function renderThinkingInline(){
  return '<div class="think-inline">' + ICONS.think +
    '<span class="label">Thinking</span>' +
    '<span>encrypted — no readable content</span></div>';
}

/* expandable thinking (only when text actually exists) */
function renderThinkingExpandable(text){
  const id = uid();
  const lc = lineCount(text);
  return '' +
  '<div class="attach">' +
    '<button class="attach-head clickable" aria-expanded="false" data-target="' + id + '" onclick="toggleBody(this)">' +
      '<span class="attach-icon">' + ICONS.think + '</span>' +
      '<span class="attach-name">Thinking</span>' +
      '<span class="attach-meta">' + esc(firstLine(text)) + '</span>' +
      '<span class="attach-size">' + lc + ' lines</span>' +
      '<span class="attach-chev">' + ICONS.chev + '</span>' +
    '</button>' +
    '<div class="attach-body" id="' + id + '"><div class="section">' +
      '<pre class="code">' + esc(text) + '</pre>' +
    '</div></div>' +
  '</div>';
}

/* tool_use card with bound tool_result inside it */
function renderToolCard(item){
  const result = findResult(item.id);
  const isError = !!(result && result.is_error);
  const fullInput = inputJson(item.input);
  const summary = inputSummary(item);
  const desc = item.input && item.input.description ? item.input.description : '';

  const resultText = result ? (typeof result.content === 'string' ? result.content : JSON.stringify(result.content, null, 2)) : '';
  const resLines = lineCount(resultText);
  const resShort = result && resLines <= 1;   // inline-render short results
  const id = uid();

  // collapsed body holds full input + (if long) full result
  let body =
    '<div class="attach-body" id="' + id + '">' +
      '<div class="section"><div class="lbl">Input</div><pre class="code">' + esc(fullInput) + '</pre></div>';
  if (result && !resShort){
    body += '<div class="section"><div class="lbl">' + (isError ? 'Error' : 'Output') + '</div>' +
            '<pre class="code">' + esc(resultText) + '</pre></div>';
  }
  body += '</div>';

  // inline result row (always shown when we have a result):
  // short result -> show full one line; long -> show a 1-line preview
  let resRow = '';
  if (result){
    resRow =
      '<div class="res-block' + (isError ? ' error' : '') + '">' +
        '<span class="res-label">' + (isError ? 'Error' : 'Result') + '</span>' +
        '<span class="res-preview">' + esc((resShort || isError) ? resultText : firstLine(resultText)) + '</span>' +
        '<span class="ok-tick">' + (isError ? ICONS.err : ICONS.ok) + '</span>' +
      '</div>';
  }

  const sizeHint = (function(){
    // size hint reflects what the disclosure will reveal
    const inputLines = lineCount(fullInput);
    if (result && !resShort) return '+' + (inputLines + resLines) + ' lines';
    return '+' + inputLines + ' lines';
  })();

  return '' +
  '<div class="attach' + (isError ? ' error' : '') + '">' +
    '<button class="attach-head clickable" aria-expanded="false" data-target="' + id + '" onclick="toggleBody(this)">' +
      '<span class="attach-icon">' + toolIcon(item.name) + '</span>' +
      '<span class="attach-name">' + esc(item.name) + '</span>' +
      '<span class="attach-meta" title="' + esc(desc || summary) + '">' + esc(summary || desc) + '</span>' +
      '<span class="attach-size">' + sizeHint + '</span>' +
      '<span class="attach-chev">' + ICONS.chev + '</span>' +
    '</button>' +
    resRow +
    body +
  '</div>';
}

/* an assistant turn: bubble (joined text) + ordered substeps rail */
function renderAssistantTurn(msg){
  const items = msg.content || [];
  const texts = items.filter(c => c.type === 'text').map(c => c.text);
  const subItems = items.filter(c => c.type === 'thinking' || c.type === 'redacted_thinking' || c.type === 'tool_use');

  let html = '<div class="turn assistant">';
  html += '<div class="turn-label"><span class="av">' + ICONS.agent + '</span>AI agent</div>';

  if (texts.length){
    html += '<div class="bubble">' + texts.map(t => '<p>' + linkifyText(t) + '</p>').join('') + '</div>';
  }

  if (subItems.length){
    html += '<div class="substeps">';
    for (const c of subItems){
      if (c.type === 'thinking' || c.type === 'redacted_thinking'){
        const hasText = c.thinking && String(c.thinking).trim();
        html += hasText ? renderThinkingExpandable(c.thinking) : renderThinkingInline();
      } else if (c.type === 'tool_use'){
        html += renderToolCard(c);
      }
    }
    html += '</div>';
  }

  html += '</div>';
  return html;
}

function renderUserTurn(msg){
  const items = msg.content || [];
  const texts = items.filter(c => c.type === 'text');
  // tool_result-only user messages are NOT rendered as bubbles — they are
  // folded into the assistant tool cards above. So skip them here.
  if (!texts.length) return '';

  let html = '<div class="turn user">';
  html += '<div class="turn-label">You<span class="av">' + ICONS.user + '</span></div>';
  html += '<div class="bubble">' + texts.map(t => '<p>' + linkifyText(t.text) + '</p>').join('') + '</div>';
  html += '</div>';
  return html;
}

/* minimal inline-code styling: wrap `code` and bare file paths lightly */
function linkifyText(t){
  let s = esc(t);
  s = s.replace(/`([^`]+)`/g, '<code>$1</code>');
  s = s.replace(/(^|\s)([\w./-]+\.(?:html|js|css|py|json|md))(?=\s|[.,]|$)/g,
    '$1<code>$2</code>');
  return s;
}

function renderTranscript(){
  let html = '';
  for (const m of TRANSCRIPT.messages){
    if (m.role === 'assistant') html += renderAssistantTurn(m);
    else html += renderUserTurn(m);
  }
  return html;
}

/* ---------- disclosure ---------- */
function toggleBody(btn){
  const id = btn.getAttribute('data-target');
  const body = document.getElementById(id);
  if (!body) return;
  const open = body.classList.toggle('open');
  btn.setAttribute('aria-expanded', open ? 'true' : 'false');
}

/* ============================================================
   SHELL / MODE PLUMBING — move the SAME node between shells
   ============================================================ */
let transcriptNode = null;
let currentMode = 'popup';
let isOpen = false;

function buildTranscript(){
  const tpl = document.getElementById('transcriptTpl');
  const node = tpl.content.firstElementChild.cloneNode(true);
  node.querySelector('#transcriptScroll').innerHTML = renderTranscript();
  return node;
}

function mountInto(shellId){
  const shell = document.getElementById(shellId);
  shell.innerHTML = '';
  shell.appendChild(transcriptNode);
  // sync the toggle pressed-state inside the (re-mounted) header
  const mp = transcriptNode.querySelector('#modePopup');
  const md = transcriptNode.querySelector('#modeDock');
  if (mp && md){
    mp.setAttribute('aria-pressed', currentMode === 'popup');
    md.setAttribute('aria-pressed', currentMode === 'dock');
  }
}

function openTranscript(){
  if (!transcriptNode) transcriptNode = buildTranscript();
  isOpen = true;
  setMode(currentMode, true);
}

function closeTranscript(){
  isOpen = false;
  document.getElementById('overlay').classList.remove('active');
  document.getElementById('dock').classList.remove('active');
  document.getElementById('page').classList.remove('docked-open');
}

function setMode(mode, force){
  if (!force && mode === currentMode && isOpen) return;
  currentMode = mode;
  if (!transcriptNode) transcriptNode = buildTranscript();

  const overlay = document.getElementById('overlay');
  const dock = document.getElementById('dock');
  const page = document.getElementById('page');

  if (mode === 'dock'){
    mountInto('dockShell');
    overlay.classList.remove('active');
    dock.classList.add('active');
    if (isOpen) page.classList.add('docked-open');
  } else {
    mountInto('popupShell');
    dock.classList.remove('active');
    page.classList.remove('docked-open');
    overlay.classList.add('active');
  }
}

/* ---------- wire up ---------- */
document.getElementById('openBtn').addEventListener('click', openTranscript);
document.getElementById('overlay').addEventListener('mousedown', function(e){
  if (e.target === this) closeTranscript();
});
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' && isOpen) closeTranscript();
});

/* open on load so the mockup shows the result immediately */
openTranscript();
</script>
</body>
